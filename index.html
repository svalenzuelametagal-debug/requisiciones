<script>
// ── Implementación OAuth2 PKCE embebida (sin dependencias externas) ──
const msal = {
  PublicClientApplication: class {
    constructor(cfg) {
      this.cfg = cfg;
      this._sk = 'mgal_' + cfg.auth.clientId.slice(0,8);
    }
    async initialize() {}
    async handleRedirectPromise() { return null; }
    getAllAccounts() {
      try { const d = localStorage.getItem(this._sk+'_acc'); return d?[JSON.parse(d)]:[];} catch{return [];}
    }
    async acquireTokenSilent({scopes}) {
      try {
        const d = localStorage.getItem(this._sk+'_tok');
        if (!d) throw new Error('no token');
        const t = JSON.parse(d);
        if (Date.now() < t.exp - 90000) return {accessToken:t.at};
        if (t.rt) return await this._refresh(t.rt, scopes);
        throw new Error('expired');
      } catch(e) { throw e; }
    }
    async _refresh(rt, scopes) {
      const s = [...new Set([...scopes,'offline_access'])];
      const r = await fetch(`${this.cfg.auth.authority}/oauth2/v2.0/token`,{
        method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'},
        body: new URLSearchParams({client_id:this.cfg.auth.clientId,grant_type:'refresh_token',refresh_token:rt,scope:s.join(' ')})
      });
      const d = await r.json();
      if (d.error) throw new Error(d.error_description||d.error);
      this._save(d); return {accessToken:d.access_token};
    }
    async loginPopup({scopes}) { return this._popup(scopes); }
    async acquireTokenPopup({scopes}) { return this._popup(scopes); }
    async logoutPopup() {
      localStorage.removeItem(this._sk+'_acc');
      localStorage.removeItem(this._sk+'_tok');
      const url = `${this.cfg.auth.authority}/oauth2/v2.0/logout?post_logout_redirect_uri=${encodeURIComponent(this.cfg.auth.redirectUri)}`;
      const p = window.open(url,'_blank','width=500,height=600');
      await new Promise(res=>setTimeout(res,2000));
      if(p&&!p.closed) p.close();
    }
    async _popup(scopes) {
      const ver = this._ver(); const chal = await this._chal(ver);
      const state = this._rnd(16); const nonce = this._rnd(16);
      const s = [...new Set([...scopes,'openid','profile','offline_access'])];
      sessionStorage.setItem(this._sk+'_ver',ver);
      sessionStorage.setItem(this._sk+'_st',state);
      const authUrl = `${this.cfg.auth.authority}/oauth2/v2.0/authorize?`+new URLSearchParams({
        client_id:this.cfg.auth.clientId,response_type:'code',
        redirect_uri:this.cfg.auth.redirectUri,scope:s.join(' '),
        state,nonce,code_challenge:chal,code_challenge_method:'S256',prompt:'select_account'
      });
      const popup = window.open(authUrl,'_msal_popup','width=520,height=680,scrollbars=yes,resizable=yes');
      if (!popup) throw new Error('El navegador bloqueó la ventana emergente. Permitilas para este sitio.');
      return new Promise((res,rej)=>{
        const tid = setInterval(async()=>{
          try {
            if (popup.closed) { clearInterval(tid); rej(new Error('Ventana cerrada por el usuario')); return; }
            let href;
            try { href = popup.location.href; } catch{ return; }
            const redir = this.cfg.auth.redirectUri;
            if (href && (href.startsWith(redir+'?') || href.startsWith(redir+'#') || href===redir || href.includes('code='))) {
              clearInterval(tid);
              const u = new URL(href);
              const code = u.searchParams.get('code');
              const st2  = u.searchParams.get('state');
              const err  = u.searchParams.get('error');
              try { popup.close(); } catch{}
              if (err) { rej(new Error(u.searchParams.get('error_description')||err)); return; }
              const saved = sessionStorage.getItem(this._sk+'_st');
              if (saved && st2 && saved!==st2) { rej(new Error('State mismatch — intentá de nuevo')); return; }
              try { const r = await this._exchange(code, scopes); res(r); }
              catch(e) { rej(e); }
            }
          } catch{}
        }, 300);
      });
    }
    async _exchange(code, scopes) {
      const ver = sessionStorage.getItem(this._sk+'_ver');
      const s = [...new Set([...(scopes||[]),'openid','profile','offline_access'])];
      const r = await fetch(`${this.cfg.auth.authority}/oauth2/v2.0/token`,{
        method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'},
        body: new URLSearchParams({client_id:this.cfg.auth.clientId,grant_type:'authorization_code',
          code,redirect_uri:this.cfg.auth.redirectUri,code_verifier:ver,scope:s.join(' ')})
      });
      const d = await r.json();
      if (d.error) throw new Error(d.error_description||d.error);
      const acc = this._parseAcc(d);
      this._save(d);
      localStorage.setItem(this._sk+'_acc', JSON.stringify(acc));
      return {accessToken:d.access_token, account:acc};
    }
    _save(d) {
      localStorage.setItem(this._sk+'_tok', JSON.stringify({
        at:d.access_token, rt:d.refresh_token||'',
        exp: Date.now()+(d.expires_in||3600)*1000
      }));
    }
    _parseAcc(d) {
      let c={};
      try { c=JSON.parse(atob(d.id_token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))); } catch{}
      return {username:c.preferred_username||c.upn||c.email||'', name:String(c.name||'').normalize('NFC'), idTokenClaims:c};
    }
    _ver() {
      const a=new Uint8Array(32); crypto.getRandomValues(a);
      return btoa(String.fromCharCode(...a)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
    }
    async _chal(v) {
      const h=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(v));
      return btoa(String.fromCharCode(...new Uint8Array(h))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
    }
    _rnd(n) {
      const a=new Uint8Array(n); crypto.getRandomValues(a);
      return Array.from(a,b=>b.toString(16).padStart(2,'0')).join('');
    }
  }
};

async function getToken() {
  const accounts = msalInstance.getAllAccounts();
  if (!accounts.length) throw new Error('No session');
  try {
    const res = await msalInstance.acquireTokenSilent({scopes:GRAPH_SCOPES, account:accounts[0]});
    return res.accessToken;
  } catch(e) {
    const res = await msalInstance.acquireTokenPopup({scopes:GRAPH_SCOPES});
    return res.accessToken;
  }
}

function getCfg() {
  try {
    const stored = JSON.parse(localStorage.getItem('mgal_cfg')||'{}');

    if (!stored.ghToken && CFG.GH_TOKEN && !CFG.GH_TOKEN.startsWith('__')) {

    if (!stored.ghRepo && CFG.GH_REPO && !CFG.GH_REPO.startsWith('__')) {

function saveCfg(obj) {

    const blobMatch = url.match(/^https:\/\/github\.com\/([^/]+)\/([^/]+)\/blob\/([^/]+)\/(.+)$/);
    const rawMatch  = url.match(/^https:\/\/raw\.githubusercontent\.com\/([^/]+)\/([^/]+)\/([^/]+)\/(.+)$/);
    const match = blobMatch || rawMatch;
    if (match) {
      apiUrl = 'https://api.github.com/repos/' + match[1] + '/' + match[2] + '/contents/' + match[4];
    } else {
      window.open(url, '_blank'); return;
    }
    const cfg = getCfg();
    const res = await fetch(apiUrl, { headers: { Authorization: 'token ' + cfg.ghToken, Accept: 'application/vnd.github.v3+json' } });
    if (!res.ok) throw new Error('GitHub ' + res.status);
    const data = await res.json();
    const b64 = data.content.replace(/\n/g, '');
    const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    const ext = (filename || '').split('.').pop().toLowerCase();
    const mimeMap = { pdf:'application/pdf', png:'image/png', jpg:'image/jpeg', jpeg:'image/jpeg',
      gif:'image/gif', webp:'image/webp', heic:'image/heic', bmp:'image/bmp',
      mp4:'video/mp4', mov:'video/quicktime', xlsx:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
      xls:'application/vnd.ms-excel', doc:'application/msword',
      docx:'application/vnd.openxmlformats-officedocument.wordprocessingml.document' };
    const mime = mimeMap[ext] || 'application/octet-stream';
    const blob = new Blob([bytes], { type: mime });
    const blobUrl = URL.createObjectURL(blob);
    window.open(blobUrl, '_blank');
    setTimeout(() => URL.revokeObjectURL(blobUrl), 10000);
  } catch(e) {
    toast('Error abriendo adjunto: ' + e.message, 'error');
  }
}

async function readDB() {
  const cfg = getCfg();
  if (!cfg.ghToken || !cfg.ghRepo) throw new Error('Sin configuracion. Pedile a Santiago el link de activacion.');
  const url = 'https://api.github.com/repos/' + cfg.ghRepo + '/contents/' + DB_GITHUB_FILE;
  const res = await fetch(url, { headers: githubHeaders(cfg.ghToken) });
  if (res.status === 404) return [];
  if (!res.ok) {
    const e = await res.json().catch(()=>({}));
    throw new Error('GitHub ' + res.status + ': ' + (e.message||'error leyendo datos'));
  }
  const data = await res.json();
  const b64 = data.content.replace(/\n/g,'');
  const bytes = Uint8Array.from(atob(b64), ch => ch.charCodeAt(0));
  return JSON.parse(new TextDecoder('utf-8').decode(bytes));
}

async function writeDB(data) {
  const cfg = getCfg();
  if (!cfg.ghToken || !cfg.ghRepo) throw new Error('Sin configuracion.');
  const url = 'https://api.github.com/repos/' + cfg.ghRepo + '/contents/' + DB_GITHUB_FILE;

  // Siempre buscar SHA fresco antes de escribir para evitar conflictos 409
  async function getFreshSha() {
    const r = await fetch(url, { headers: githubHeaders(cfg.ghToken) });
    if (r.ok) { const d = await r.json(); return d.sha || null; }
    if (r.status === 404) return null;
    const e = await r.json().catch(()=>({}));
    throw new Error('GitHub ' + r.status + ': ' + (e.message||'error'));
  }

  const jsonStr = JSON.stringify(data, null, 2);
  const bytes2 = new TextEncoder().encode(jsonStr);
  let b64str = ''; bytes2.forEach(b => b64str += String.fromCharCode(b));
  const content = btoa(b64str);

  // Reintentar hasta 3 veces en caso de 409 (conflicto de SHA)
  for (let attempt = 1; attempt <= 3; attempt++) {
    const sha = await getFreshSha();
    const body = { message: 'update', content };
    if (sha) body.sha = sha;
    const res = await fetch(url, { method:'PUT', headers:githubHeaders(cfg.ghToken), body:JSON.stringify(body) });
    if (res.ok) return res.json();
    const e = await res.json().catch(()=>({}));
    if (res.status === 409 && attempt < 3) {
      // SHA desactualizado — esperar un momento y reintentar con SHA fresco
      await new Promise(r => setTimeout(r, 500 * attempt));
      continue;
    }
    throw new Error('GitHub ' + res.status + ': ' + (e.message||'error guardando'));
  }
}

async function setupGitHubStorage(ghToken, ghRepo) {
  const repoRes = await fetch('https://api.github.com/repos/' + ghRepo, { headers: githubHeaders(ghToken) });
  if (!repoRes.ok) {
    const e = await repoRes.json().catch(()=>({}));
    throw new Error('No se pudo acceder al repo: ' + (e.message||repoRes.status));
  }
  const fileRes = await fetch(
    'https://api.github.com/repos/' + ghRepo + '/contents/' + DB_GITHUB_FILE,
    { headers: githubHeaders(ghToken) }
  );
  if (fileRes.status === 404) {
    await fetch('https://api.github.com/repos/' + ghRepo + '/contents/' + DB_GITHUB_FILE, {
      method: 'PUT', headers: githubHeaders(ghToken),
      body: JSON.stringify({ message: 'init', content: btoa('[]') })
    });
  }
  saveCfg({ ghToken, ghRepo });
  return { ghToken, ghRepo };
}

async function listItems()           { return await readDB(); }

async function updateItem(id,fields) { const d=await readDB(); const i=d.findIndex(x=>x.id===id); if(i<0) throw new Error('No encontrada'); d[i]={...d[i],...fields}; await writeDB(d); return d[i]; }
async function deleteItem(id)        { await writeDB((await readDB()).filter(x=>x.id!==id)); }




async function graphReq(method, url, body = null) {
  const token = await getToken();
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json', Accept: 'application/json', Authorization: `Bearer ${token}` }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch('https://graph.microsoft.com/v1.0' + url, opts);
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: { message: res.statusText } }));
    throw new Error(err?.error?.message || res.statusText);
  }
  const ct = res.headers.get('content-type') || '';
  if (ct.includes('json')) return res.json();
  return null;
}

async function sendMailWithAttachments(toArr, subject, htmlBody, ccArr=[], attachments=[]) {
  try {
    const recipients = (Array.isArray(toArr) ? toArr : [toArr])
      .filter(Boolean).map(a => ({ emailAddress: { address: a } }));
    if (!recipients.length) return;
    const ccRecipients = ccArr.filter(Boolean).map(a => ({ emailAddress: { address: a } }));
    const msg = { subject, body: { contentType: 'HTML', content: htmlBody }, toRecipients: recipients };
    if (ccRecipients.length) msg.ccRecipients = ccRecipients;
    if (attachments.length) msg.attachments = attachments;
    await graphReq('POST', '/me/sendMail', { message: msg, saveToSentItems: true });
  } catch(e) {
    const detail = e.message || String(e);
    console.error('Mail.Send error:', detail);
    throw new Error(detail);
  }
}

async function generateNumber(dept) {
  const code = DEPT_BY_NAME[dept]?.code || dept;
  const year  = new Date().getFullYear();
  const prefix = `${code}-${year}-`;

  // Reintentar hasta 5 veces en caso de colision
  for (let attempt = 0; attempt < 5; attempt++) {
    if (attempt > 0) await new Promise(r => setTimeout(r, 200 + Math.random() * 300));
    const data = await readDB();
    let max = 0;
    data.forEach(i => {
      const t = i.Title || '';
      if (t.startsWith(prefix)) {
        const parts = t.split('-');
        const n = parseInt(parts[parts.length - 1], 10);
        if (!isNaN(n) && n > max) max = n;
      }
    });
    const candidate = `${code}-${year}-${String(max + 1).padStart(6, '0')}`;
    // Verificar que el numero no exista ya (proteccion contra condicion de carrera)
    const exists = data.some(i => i.Title === candidate);
    if (!exists) return candidate;
  }
  // Fallback con timestamp para garantizar unicidad
  const ts = Date.now().toString().slice(-6);
  return `${code}-${year}-T${ts}`;
}

async function fetchTC(force=false) {
  const badge = document.getElementById('tc-badge');
  if (badge) badge.textContent = 'TC: actualizando…';

  // Verificar si ya tenemos TC del día de hoy — si es así no re-fetchar (salvo force=true)
  if (!force) {
    const today = new Date().toISOString().slice(0,10);
    try {
      const cached = JSON.parse(localStorage.getItem('mgal_tc')||'{}');
      if (cached._date === today && cached.usd_venta) {
        updateTCBadge(); return; // ya tenemos el TC de hoy
      }
    } catch(e){}
  }

  // Helper: fetch con timeout manual (compatible con todos los browsers)
  function fetchTimeout(url, ms) {
    return new Promise((resolve, reject) => {
      const t = setTimeout(() => reject(new Error('timeout')), ms);
      fetch(url).then(r => { clearTimeout(t); resolve(r); }).catch(e => { clearTimeout(t); reject(e); });
    });
  }

  // Intentar múltiples fuentes con fallback
  const sources = [
    async () => {
      const r = await fetchTimeout('https://dolarapi.com/v1/dolares/oficial', 5000);
      if (!r.ok) throw new Error('dolarapi '+r.status);
      const d = await r.json();
      return { usd_compra: Number(d.compra).toFixed(2), usd_venta: Number(d.venta).toFixed(2) };
    },
    async () => {
      const r = await fetchTimeout('https://api.bluelytics.com.ar/v2/latest', 5000);
      if (!r.ok) throw new Error('bluelytics '+r.status);
      const d = await r.json();
      return { usd_compra: Number(d.oficial.value_buy).toFixed(2), usd_venta: Number(d.oficial.value_sell).toFixed(2) };
    },
    async () => {
      const r = await fetchTimeout('https://apis.datos.gob.ar/series/api/series/?ids=168.1_T_CAMBIOR_D_0_0_26:value,168.1_T_CAMBIOR_D_0_0_27:value&last=1&format=json', 8000);
      if (!r.ok) throw new Error('datos.gob '+r.status);
      const json = await r.json();
      const d = json?.data?.[0];
      if (!d || !d[1]) throw new Error('sin datos');
      return { usd_compra: Number(d[1]).toFixed(2), usd_venta: Number(d[2]).toFixed(2) };
    },
  ];

  let ok = false;
  for (const src of sources) {
    try {
      const result = await src();
      if (result.usd_venta && Number(result.usd_venta) > 0) {
        tcManual.usd_compra = result.usd_compra;
        tcManual.usd_venta  = result.usd_venta;
        tcManual._date = new Date().toISOString().slice(0,10);
        try { localStorage.setItem('mgal_tc', JSON.stringify(tcManual)); } catch(e2){}
        ok = true;
        break;
      }
    } catch(e) { /* probar siguiente fuente */ }
  }

  if (!ok && badge) badge.textContent = 'TC: sin conexión';
  updateTCBadge();
}

function updateTCBadge() {
  const badge = document.getElementById('tc-badge');
  const usdC = tcManual.usd_compra ? `$${Number(tcManual.usd_compra).toLocaleString('es-AR',{minimumFractionDigits:2})}` : '—';
  const usdV = tcManual.usd_venta  ? `$${Number(tcManual.usd_venta).toLocaleString('es-AR',{minimumFractionDigits:2})}` : '—';
  const eurC = tcManual.eur_compra ? `€${Number(tcManual.eur_compra).toLocaleString('es-AR',{minimumFractionDigits:2})}` : '—';
  const eurV = tcManual.eur_venta  ? `€${Number(tcManual.eur_venta).toLocaleString('es-AR',{minimumFractionDigits:2})}` : '—';
  badge.textContent = `USD C:${usdC} V:${usdV}${tcManual.eur_venta?` | EUR V:${eurV}`:''}`;
  badge.title = `TC BNA Billete (clic para editar)\nUSD Compra: ${usdC} | USD Venta: ${usdV}\nEUR Compra: ${eurC} | EUR Venta: ${eurV}`;
}

function normalizeStr(s) {
  if (!s) return '';
  try { return String(s).normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase(); }
  catch(e) { return String(s).toLowerCase(); }
}

// Corrige texto que viene descompuesto de Microsoft (NFD -> NFC)
function fixEncoding(s) {
  if (!s) return '';
  try { return String(s).normalize('NFC'); }
  catch(e) { return String(s); }
}

    'Rechazada Nivel 1':                       'Devuelta por Compras',

    'Rechazada por Finanzas':                  'Observada por Finanzas',

  };
  return LEGACY[s] || s;
}

function canEditDraft(item) {
  if (userRole === 'admin') return true;
  const st = _normalizeStatus(item.Status);
  const isOwner = item.RequesterMail === currentUser?.username;
  // Solicitante puede editar antes del visto bueno N1 (DRAFT o SENT)
  if (isOwner && [S.DRAFT, S.SENT, S.REJ1, S.REJ2, S.REJGER, S.REJFIN].includes(st)) return true;
  // N1 (approver) puede editar antes de la autorización N2 (DRAFT, SENT, APP1)
  if (userRole === 'approver' && [S.DRAFT, S.SENT, S.APP1].includes(st)) return true;
  return false;
}

function exportCSV(rows, filename) {
  if (!rows.length) return;
  const keys = Object.keys(rows[0]);
  const hdr = keys.map(k=>'"'+k+'"').join(',');
  const body = rows.map(r=>keys.map(k=>'"'+String(r[k]||'').replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+hdr+'\n'+body],{type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

async function loadItems() {
  const rawItems = await readDB();
  const mapped = rawItems.map(mapItem);
  if (userRole==='admin' || userRole==='approver') {
    allItems = mapped; // ven todas
  } else if (userRole==='gerente') {
    allItems = mapped.filter(i=>
      i.RequiereGerencia===true && [S.APP2,S.APPGER,S.REJGER].includes(i.Status)
    );
  } else if (userRole==='finanzas') {
    allItems = mapped.filter(i=>
      [S.APPGER,S.APPFIN,S.REJFIN,S.OC].includes(i.Status)
    );
  } else {
    allItems = mapped.filter(i=>i.RequesterMail===currentUser.username);
  }
  return allItems;
}

  if (userRole==='gerente')  btns.push({view:'gerente',  label:'📊 Reporte Gerencia'});

    btns.push({view:'list',     label:'📥 Aprobaciones N2',  extra:'approvals'});
    btns.push({view:'gerente',  label:'🏢 Vista Gerencia'});
    btns.push({view:'finanzas', label:'💰 Vista Finanzas'});
    btns.push({view:'dashboard',label:'📈 Análisis'});
    btns.push({view:'report',   label:'🎯 Dashboard'});
    btns.push({view:'init',     label:'⚙ Inicialización'});
  }
  nav.innerHTML = btns.map(b=>`
    <button class="nav-btn" data-view="${b.view}" data-extra="${b.extra||''}">${b.label}</button>
  `).join('');
  nav.querySelectorAll('.nav-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      if (btn.dataset.extra==='approvals') {
        renderList(true);
        showView('list');
      } else if (btn.dataset.view==='form') {
        renderForm(null); showView('form');
      } else if (btn.dataset.view==='dashboard') {
        renderDashboard(); showView('dashboard');
      } else if (btn.dataset.view==='report') {
        renderReport(); showView('report');
      } else if (btn.dataset.view==='init') {
        renderInit(); showView('init');
      } else if (btn.dataset.view==='finanzas') {
        renderFinanzasView(); showView('finanzas');
      } else if (btn.dataset.view==='gerente') {
        renderGerenteView(); showView('gerente');
      } else {
        renderList(false); showView('list');
      }
      document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));
      btn.classList.add('active');
    });
  });
}

// ================================================================
function renderList(approvalsMode=false) {
  showView('list');
  const container = document.getElementById('view-list');

  // Build filter bar
  const deptOptions = DEPARTMENTS.map(d=>`<option value="${d.name}">${d.name}</option>`).join('');
  const statusOptions = Object.values(S).map(s=>`<option value="${s}">${s}</option>`).join('');

  container.innerHTML = `
    <div class="section-header">
      <div>
        <div class="section-title">${approvalsMode ? 'Aprobaciones Pendientes' : (userRole==='admin'||userRole==='approver') ? 'Todas las Requisiciones' : 'Mis Requisiciones'}</div>
        <div class="section-sub" id="list-count"></div>
      </div>
      <div class="ml-auto d-flex">
        <button class="btn btn-secondary btn-sm" id="btn-refresh-list">↻ Actualizar</button>
        <button class="btn btn-secondary btn-sm" id="btn-export-csv">⬇ CSV</button>
      </div>
    </div>
    <div id="alerts-bar"></div>
    <div id="pipeline-summary" style="margin-bottom:12px"></div>
    <div class="filter-bar">
      <input type="text" id="flt-q" placeholder="Buscar..." style="max-width:200px"/>
      <select id="flt-dept"><option value="">Todos los depto.</option>${deptOptions}</select>
      <select id="flt-status"><option value="">Todos los estados</option>${statusOptions}</select>
      <select id="flt-urg"><option value="">Toda urgencia</option><option>Normal</option><option>Alta</option><option>Crítica</option></select>
    </div>
    <div id="list-loading" class="loading-overlay"><div class="loader"></div> Cargando…</div>
    <div id="list-table-wrap" class="hidden"></div>
  `;

  async function doLoad() {
    document.getElementById('list-loading').classList.remove('hidden');
    document.getElementById('list-table-wrap').classList.add('hidden');
    try {
      await loadItems();
      const alertsBar = document.getElementById('alerts-bar');
      if (alertsBar) {
        const criticas = allItems.filter(i=>i.Urgency==='Crítica'&&(i.Status===S.SENT||i.Status===S.APP1));
        const vencidas = allItems.filter(i=>i.NeedBy&&new Date(i.NeedBy)<new Date()&&i.Status!==S.OC&&i.Status!==S.DRAFT&&i.Status!==S.REJ1&&i.Status!==S.REJ2);
        let html='';
        if (criticas.length) html+=`<div style="background:rgba(217,64,64,.12);border:1px solid rgba(217,64,64,.3);border-radius:4px;padding:10px 16px;margin-bottom:10px;font-size:13px;color:var(--red)">⚠ <strong>${criticas.length} requisición(es) CRÍTICA(S)</strong> pendiente(s) de aprobación</div>`;
        if (vencidas.length) html+=`<div style="background:rgba(224,98,26,.12);border:1px solid rgba(224,98,26,.3);border-radius:4px;padding:10px 16px;margin-bottom:10px;font-size:13px;color:var(--orange)">📅 <strong>${vencidas.length} requisición(es)</strong> con fecha necesaria vencida y sin OC asignada</div>`;
        alertsBar.innerHTML=html;
      }
      // Resumen de pipeline para admin/approver
      const summaryEl = document.getElementById('pipeline-summary');
      if (summaryEl && (userRole==='admin'||userRole==='approver') && !approvalsMode) {
        const PIPE = [S.SENT,S.APP1,S.APP2,S.APP2NOGER];
        const pipe = allItems.filter(i=>PIPE.includes(i.Status));
        if (pipe.length) {
          const n2 = n=>Number(n||0).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2});
          const sumLines=(item,cur)=>parseLines(item.LinesJSON||'[]').filter(l=>l.currency===cur).reduce((s,l)=>s+(l.qty||0)*(l.price||0),0);
          const tARS = pipe.reduce((s,i)=>s+sumLines(i,'ARS'),0);
          const tUSD = pipe.reduce((s,i)=>s+sumLines(i,'USD'),0);
          const tEUR = pipe.reduce((s,i)=>s+sumLines(i,'EUR'),0);
          const tUSDv = parseFloat(tcManual.usd_venta)||0;
          const tEURv = parseFloat(tcManual.eur_venta)||0;
          const equiv = tARS + tUSD*tUSDv + tEUR*tEURv;
          // Breakdown by status
          const byStatus = {};
          pipe.forEach(i=>{ byStatus[i.Status]=(byStatus[i.Status]||0)+1; });
          const statusChips = Object.entries(byStatus).map(([st,n])=>
            `<span style="background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:2px 10px;font-size:11px;white-space:nowrap">${escH(st)}: <b>${n}</b></span>`
          ).join(' ');
          summaryEl.innerHTML = `
            <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px">
              <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap">
                <span style="font-size:13px;font-weight:700;color:var(--text0)">⏳ En proceso</span>
                <span style="background:var(--accent);color:#000;border-radius:20px;padding:1px 9px;font-size:12px;font-weight:700">${pipe.length} req</span>
                ${statusChips}
              </div>
              <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center">
                ${tARS>0?`<span style="font-family:var(--mono);font-size:13px;font-weight:700">ARS <b>$${n2(tARS)}</b></span>`:''}
                ${tUSD>0?`<span style="font-family:var(--mono);font-size:13px;font-weight:700;color:#4caf8a">USD <b>${n2(tUSD)}</b></span>`:''}
                ${tEUR>0?`<span style="font-family:var(--mono);font-size:13px;font-weight:700;color:#5b8dee">EUR <b>${n2(tEUR)}</b></span>`:''}
                ${equiv>0&&(tUSDv||tEURv)?`<span style="font-family:var(--mono);font-size:13px;font-weight:700;color:var(--accent)">≈ ARS <b>$${n2(equiv)}</b> <span style="font-size:10px;font-weight:400;color:var(--text2)">(TC actual)</span></span>`:''}
              </div>
            </div>`;
        } else {
          summaryEl.innerHTML = '';
        }
      }
      renderTable(approvalsMode);
    } catch(e) {
      toast('Error cargando requisiciones: '+e.message,'error');
    } finally {
      document.getElementById('list-loading').classList.add('hidden');
    }
  }

  function getFiltered(am) {
    const q = (document.getElementById('flt-q')?.value||'').toLowerCase();
    const dept = document.getElementById('flt-dept')?.value||'';
    const status = document.getElementById('flt-status')?.value||'';
    const urg = document.getElementById('flt-urg')?.value||'';
    let items = [...allItems];
    if (am) {
      if (userRole==='approver') items = items.filter(i=>i.Status===S.SENT);
      else if (userRole==='admin') items = items.filter(i=>i.Status===S.APP1);
    }
    const qn=normalizeStr(q); items = items.filter(i=>normalizeStr(i.Title+'|'+i.RequesterName+'|'+i.Dept+'|'+i.Justification+'|'+(i.OCNumber||'')+'|'+(i.Buyer||'')+'|'+(i.GLAccount||'')).includes(qn));
    if (dept) items = items.filter(i=>i.Dept===dept);
    if (status) items = items.filter(i=>i.Status===status);
    if (urg) items = items.filter(i=>i.Urgency===urg);
    return items;
  }

  function renderTable(am) {
    const wrap = document.getElementById('list-table-wrap');
    const items = getFiltered(am);
    document.getElementById('list-count').textContent = `${items.length} registro(s)`;
    if (!items.length) {
      wrap.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📭</div>Sin resultados</div>`;
      wrap.classList.remove('hidden');
      return;
    }
    const rows = items.map(i=>{
      const bc = getBadgeClass(i.Status);
      const ub = getUrgencyBadge(i.Urgency);
      const lines = parseLines(i.LinesJSON);
      const canDel  = userRole==='admin' || ([S.DRAFT,S.SENT].includes(i.Status) && i.RequesterMail===currentUser.username);
      const canEdit = userRole==='admin'
        || ([S.DRAFT,S.SENT,S.REJ1,S.REJ2,S.REJGER,S.REJFIN].includes(i.Status) && i.RequesterMail===currentUser.username)
        || (userRole==='approver' && [S.DRAFT,S.SENT,S.APP1].includes(i.Status));
      const isOverdue = i.NeedBy && new Date(i.NeedBy)<new Date() && i.Status!==S.OC && i.Status!==S.DRAFT && i.Status!==S.REJ1 && i.Status!==S.REJ2;
      const isDraftOld = i.Status===S.DRAFT && i.CreatedAt && ((Date.now()-new Date(i.CreatedAt).getTime())>30*24*60*60*1000);
      return `<tr data-id="${i._id}" class="req-row" style="${isOverdue?'border-left:3px solid var(--orange)':''}">
        <td style="cursor:pointer"><span class="num">${escH(i.Title)}</span>${isOverdue?` <span style="font-size:10px;color:var(--orange)" title="Fecha necesaria vencida">⏰</span>`:''}${isDraftOld?` <span style="font-size:10px;color:var(--yellow)" title="Borrador sin enviar hace más de 30 días">⚠ Borrador antiguo</span>`:''}${parseComments(i.CommentsJSON||'[]').length?` <span style="font-size:10px;color:var(--accent2)" title="Tiene comentarios">💬${parseComments(i.CommentsJSON||'[]').length}</span>`:''}</td>
        <td>${escH(i.Dept)}</td>
        <td>${escH(i.RequesterName)}</td>
        <td><span class="badge ${ub}">${escH(i.Urgency)}</span></td>
        <td><span class="badge ${bc}">${escH(_normalizeStatus(i.Status))}</span></td>
        <td style="font-family:var(--mono);font-size:12px;color:var(--accent2)">${i.OCNumber||'\u2014'}</td>
        <td>${lines.length} ítem(s)</td>
        <td>${fmt(i.NeedBy)}</td>
        <td>${fmt(i.CreatedAt)}</td>
        <td class="text-muted" style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escH(i.Justification).substring(0,60)}</td>
        <td style="white-space:nowrap">
          ${canEdit?`<button class="btn btn-secondary btn-xs btn-edit-row" data-id="${i._id}" title="Editar">✏</button>`:''}
          ${canDel?`<button class="btn btn-danger btn-xs btn-del-row" data-id="${i._id}" title="Eliminar">🗑</button>`:''}
        </td>
      </tr>`;
    }).join('');
    wrap.innerHTML = `
      <div style="overflow-x:auto">
      <table>
        <thead><tr>
          <th>N° Req.</th><th>Departamento</th><th>Solicitante</th><th>Urgencia</th><th>Estado</th><th>N° OC</th><th>Ítems</th><th>Fecha necesaria</th><th>Creada</th><th>Justificación</th><th></th>
        </tr></thead>
        <tbody id="list-tbody">${rows}</tbody>
      </table>
      </div>`;
    wrap.classList.remove('hidden');
    wrap.querySelectorAll('.req-row').forEach(r=>{
      r.addEventListener('dblclick',()=>{
        const item = allItems.find(i=>i._id===r.dataset.id);
        if (item) { renderDetail(item); showView('detail'); }
      });
      r.addEventListener('click',e=>{
        if (e.target.closest('button')) return;
        wrap.querySelectorAll('.req-row').forEach(x=>x.style.background='');
        r.style.background='var(--bg3)';
      });
    });
    wrap.querySelectorAll('.btn-edit-row').forEach(b=>{
      b.addEventListener('click',e=>{
        e.stopPropagation();
        const item = allItems.find(i=>i._id===b.dataset.id);
        if (item) { renderForm(item); showView('form'); }
      });
    });
    wrap.querySelectorAll('.btn-del-row').forEach(b=>{
      b.addEventListener('click',async e=>{
        e.stopPropagation();
        const item = allItems.find(i=>i._id===b.dataset.id);
        if (!item) return;
        if (!confirm(`¿Eliminar la requisición ${item.Title}? Esta acción no se puede deshacer.`)) return;
        b.disabled=true; b.textContent='…';
        try {
          await deleteItem(item._id);
          toast(`Requisición ${item.Title} eliminada`,'info');
          await doLoad();
        } catch(err) {
          toast('Error al eliminar: '+err.message,'error');
          b.disabled=false; b.textContent='🗑';
        }
      });
    });
  }

  ['flt-q','flt-dept','flt-status','flt-urg'].forEach(id=>{
    setTimeout(()=>{
      const el = document.getElementById(id);
      if (el) el.addEventListener('input',()=>renderTable(approvalsMode));
    },100);
  });

  document.getElementById('btn-refresh-list').addEventListener('click', doLoad);
  document.getElementById('btn-export-csv').addEventListener('click',()=>{
    const items = getFiltered(approvalsMode);
    const rows = items.map(i=>({
      Numero:i.Title,Departamento:i.Dept,Solicitante:i.RequesterName,Mail:i.RequesterMail,
      Estado:i.Status,Urgencia:i.Urgency,CuentaGL:i.GLAccount,CentroCosto:i.CostCenter,
      Justificacion:i.Justification,Proveedor:i.Vendor,FechaNecesaria:fmt(i.NeedBy),
      Creada:fmtDT(i.CreatedAt),Enviada:fmtDT(i.SubmittedAt),
      Aprobador1:i.Lvl1By,NotaN1:i.Lvl1Note,
      Aprobador2:i.Lvl2By,NotaN2:i.Lvl2Note,
      OC:i.OCNumber,FechaOC:fmt(i.OCDate),Comprador:i.Buyer,
    }));
    exportCSV(rows,`Requisiciones_${new Date().toISOString().slice(0,10)}.csv`);
  });

  doLoad();
}

  let lines = parseLines(item?.LinesJSON||'[]');
  if (!lines.length) lines.push({desc:'',qty:1,unit:'UN',currency:'ARS',price:'',link:'',obs:''});

  function readLinesFromDOM() {
    const rows = document.getElementById('items-body')?.querySelectorAll('tr')||[];
    return Array.from(rows).map(r=>({
      desc:     r.querySelector('.il-desc')?.value||'',
      qty:      parseFloat(r.querySelector('.il-qty')?.value)||0,
      unit:     r.querySelector('.il-unit')?.value||'UN',
      currency: r.querySelector('.il-cur')?.value||'ARS',
      gl:       r.querySelector('.il-gl')?.value?.trim()||'',
      price:    parseFloat(r.querySelector('.il-price')?.value)||0,
      link:     r.querySelector('.il-link')?.value||'',
      obs:      r.querySelector('.il-obs')?.value||'',
    }));
  }

  function syncLinesFromDOM() {
    const fromDOM = readLinesFromDOM();
    if (fromDOM.length) lines = fromDOM;
  }

  function renderItems() {
    const tbody = document.getElementById('items-body');
    if (!tbody) return;
    tbody.innerHTML = lines.map((l,i)=>`
      <tr>
        <td><input type="text" class="il-desc" value="${escH(l.desc||'')}" placeholder="Descripción del ítem"/></td>
        <td><input type="number" class="il-qty" value="${escH(String(l.qty||1))}" min="0.01" step="any" style="width:60px"/></td>
        <td><input type="text" class="il-unit" value="${escH(l.unit||'UN')}" style="width:50px"/></td>
        <td><select class="il-cur">
          <option ${(l.currency||'ARS')==='ARS'?'selected':''}>ARS</option>
          <option ${(l.currency||'ARS')==='USD'?'selected':''}>USD</option>
          <option ${(l.currency||'ARS')==='EUR'?'selected':''}>EUR</option>
        </select></td>
        <td><input type="text" class="il-gl" value="${escH(l.gl||'')}" placeholder="Cta GL" style="width:70px;font-family:var(--mono);font-size:11px"/></td>
        <td><input type="number" class="il-price" value="${escH(String(l.price||''))}" min="0" step="any" style="width:80px"/></td>
        <td><input type="text" class="il-link" value="${escH(l.link||'')}" placeholder="URL o referencia"/></td>
        <td><input type="text" class="il-obs" value="${escH(l.obs||'')}" placeholder="Obs."/></td>
        <td><button class="item-del" data-i="${i}" title="Eliminar">✕</button></td>
      </tr>`).join('');

    tbody.querySelectorAll('.item-del').forEach(b=>{
      b.addEventListener('click',()=>{
        syncLinesFromDOM();
        lines.splice(Number(b.dataset.i),1);
        if (!lines.length) lines.push({desc:'',qty:1,unit:'UN',currency:'ARS',price:'',link:'',obs:''});
        renderItems();
        calcTotal();
      });
    });
    tbody.querySelectorAll('input,select').forEach(el=>{
      el.addEventListener('input', calcTotal);
    });
    calcTotal();
  }

  function getLines() {
    syncLinesFromDOM();
    return lines;
  }

  function calcTotal() {
    const current = readLinesFromDOM();
    const groups = {};
    current.forEach(l=>{
      const c = l.currency||'ARS';
      groups[c] = (groups[c]||0) + (l.qty||0)*(l.price||0);
    });
    const parts = Object.entries(groups).filter(([,v])=>v>0).map(([c,v])=>`${c} ${v.toLocaleString('es-AR',{minimumFractionDigits:2})}`);
    const el = document.getElementById('items-total');
    if (el) el.textContent = parts.length ? 'Total estimado: '+parts.join(' + ') : '';
  }

  // Render existing attachments
  const existAtt = parseAttachments(item?.AttachmentsJSON||'[]');
  if (existAtt.length) {
    document.getElementById('attach-existing').innerHTML = existAtt.map(a=>`
      <div class="attach-item">📎 <a href="${escH(toRawUrl(a.webUrl))}" target="_blank">${escH(a.name)}</a></div>
    `).join('');
  }

  document.getElementById('btn-add-item').addEventListener('click',()=>{
    syncLinesFromDOM();
    lines.push({desc:'',qty:1,unit:'UN',currency:'ARS',price:'',link:'',obs:''});
    renderItems();
  });

  document.getElementById('btn-cancel-form').addEventListener('click',()=>{
    renderList(false);
  });

  function validate() {
    const dept   = document.getElementById('f-dept').value;
    const name   = document.getElementById('f-reqname').value.trim();
    const mail   = document.getElementById('f-reqmail').value.trim();
    const just   = document.getElementById('f-just').value.trim();
    const lines  = getLines().filter(l=>l.desc.trim());
    if (!dept) { toast('Seleccioná un departamento','error'); return null; }
    if (!name) { toast('Ingresá nombre del solicitante','error'); return null; }
    if (!mail) { toast('Ingresá mail del solicitante','error'); return null; }
    if (!just) { toast('Ingresá la justificación','error'); return null; }
    if (!lines.length) { toast('Agregá al menos un ítem con descripción','error'); return null; }
    return {dept,name,mail,just,lines};
  }

  async function uploadNewFiles(reqNum) {
    const fileInput = document.getElementById('f-files');
    const files = fileInput?.files||[];
    if (!files.length) return [];
    const cfg = getCfg();
    const uploaded = [];
    const status = document.getElementById('attach-upload-status');
    for (let i=0;i<files.length;i++) {
      const f = files[i];
      status.textContent = `Subiendo ${i+1}/${files.length}: ${f.name}…`;
      try {
        // Leer archivo como base64
        const b64 = await new Promise((res, rej) => {
          const reader = new FileReader();
          reader.onload = () => res(reader.result.split(',')[1]);
          reader.onerror = rej;
          reader.readAsDataURL(f);
        });
        // Subir a GitHub en carpeta adjuntos/<reqNum>/
        const path = `adjuntos/${reqNum}/${Date.now()}_${f.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
        const url = `https://api.github.com/repos/${cfg.ghRepo}/contents/${path}`;
        // Verificar si ya existe (para obtener sha)
        let sha = undefined;
        try {
          const check = await fetch(url, { headers: { Authorization: `token ${cfg.ghToken}`, 'Content-Type': 'application/json' } });
          if (check.ok) { const d = await check.json(); sha = d.sha; }
        } catch(_) {}
        const body = { message: `Adjunto: ${f.name}`, content: b64, ...(sha ? { sha } : {}) };
        const res = await fetch(url, {
          method: 'PUT',
          headers: { Authorization: `token ${cfg.ghToken}`, 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (!res.ok) throw new Error(`GitHub ${res.status}`);
        const data = await res.json();
        // Construir URL raw para que abra/descargue directo sin pasar por GitHub viewer
        const rawPath = data.content?.path || path;
        const webUrl = `https://raw.githubusercontent.com/${cfg.ghRepo}/main/${rawPath}`;
        uploaded.push({ name: f.name, webUrl, id: path });
      } catch(e) {
        toast(`Error subiendo ${f.name}: ${e.message}`, 'error');
      }
    }
    status.textContent = '';
    return uploaded;
  }

  async function saveReq(send) {
    const v = validate();
    if (!v) return;
    const btn = send ? document.getElementById('btn-send-req') : document.getElementById('btn-save-draft');
    btn.disabled = true;
    btn.textContent = '⏳ Guardando…';
    try {
      let reqNum = item?.Title;
      if (!reqNum) {
        reqNum = await generateNumber(v.dept);
      }
      const newFiles = await uploadNewFiles(reqNum);
      const allAttach = [...existAtt, ...newFiles];
      const now = isoNow();
      const reqGer = document.getElementById('f-req-ger')?.checked || false;
      const fields = {
        Title:           reqNum,
        Dept:            v.dept,
        RequesterName:   fixEncoding(v.name||''),
        RequesterMail:   v.mail,
        GLAccount:       document.getElementById('f-gl').value.trim(),
        CostCenter:      document.getElementById('f-cc').value.trim(),
        Urgency:         document.getElementById('f-urgency').value,
        Justification:   v.just,
        Vendor:          document.getElementById('f-vendor').value.trim(),
        NeedBy:          document.getElementById('f-needby').value||null,
        RequiereGerencia: reqGer,
        // Lógica de estado al guardar edición
        Status: (() => {
          if (isEdit && item) {
            const normalizedSt = _normalizeStatus(item.Status);
            if (userRole==='admin') {
              // Admin: preserva estado siempre
              return normalizedSt;
            }
            if (userRole==='approver') {
              // N1: si edita APP1, vuelve a SENT para que N2 la vea como modificada
              if (normalizedSt===S.APP1) return S.SENT;
              // Si edita SENT/DRAFT, flujo normal
              return send ? S.SENT : S.DRAFT;
            }
            // Solicitante: si edita SENT, vuelve a DRAFT (debe reenviar)
            if (normalizedSt===S.SENT) return S.DRAFT;
          }
          return send ? S.SENT : S.DRAFT;
        })(),
        LinesJSON:       JSON.stringify(v.lines),
        AttachmentsJSON: JSON.stringify(allAttach),
        UpdatedAt:       now,
      };
      if (send && !item?.SubmittedAt) fields.SubmittedAt = now;
      if (!isEdit) {
        fields.CreatedAt = now;
        const created = await createItem(fields);
        if (send) {
          const fullItem = mapItem({...fields, id: created.id||Date.now().toString()});
          await notificar(fullItem,'📋 Nueva requisición enviada para aprobación','',[ROLES_APPROVER[0], ROLES_ADMIN[0]]);
        }
        toast(`Requisición ${reqNum} ${send?'enviada':'guardada'} correctamente.`,'success');
      } else {
        const wasRejected = [S.REJ1,S.REJ2,S.REJGER,S.REJFIN].includes(item.Status);
        if (send && wasRejected) {
          // Limpiar campos de aprobación anterior y reenviar
          fields.Status = S.SENT;
          fields.SubmittedAt = fields.SubmittedAt || isoNow();
          fields.Lvl1At=''; fields.Lvl1By=''; fields.Lvl1Note='';
          fields.Lvl2At=''; fields.Lvl2By=''; fields.Lvl2Note='';
          fields.GerAt=''; fields.GerBy=''; fields.GerNote='';
          fields.FinAt=''; fields.FinBy=''; fields.FinNote='';
          fields.SelectedVendor=''; fields.VendorCriteria='';
        }
        await updateItem(item._id, fields);
        const newStatus = fields.Status;
        const fullItemUpd = mapItem({...item, ...fields});
        if (send && (item.Status===S.DRAFT || wasRejected)) {
          const msg = wasRejected ? '📋 Requisición corregida y reenviada para aprobación' : '📋 Requisición enviada para aprobación';
          await notificar(fullItemUpd, msg, '', [ROLES_APPROVER[0], ROLES_ADMIN[0]]);
        } else if (isEdit && userRole==='approver' && newStatus===S.SENT && _normalizeStatus(item.Status)===S.APP1) {
          // N1 modificó una req ya revisada — avisar a N2
          await notificar(fullItemUpd,'✏ Requisición modificada por Compras N1 — requiere nueva autorización','',[ROLES_ADMIN[0]]);
        } else if (isEdit && newStatus===S.DRAFT && _normalizeStatus(item.Status)===S.SENT) {
          // Solicitante modificó — queda en borrador
        }
        const editMsg = isEdit && !send ? 'guardada' : send ? 'reenviada' : 'guardada';
        toast('Requisición '+reqNum+' '+editMsg+' correctamente.','success');
      }
      renderList(false);
    } catch(e) {
      toast('Error al guardar: '+e.message,'error');
    } finally {
      btn.disabled = false;
      btn.textContent = send ? '📤 Enviar para aprobación' : '💾 Guardar borrador';
      const btnB = send ? document.getElementById('btn-send-req-b') : document.getElementById('btn-save-draft-b');
      if (btnB) btnB.textContent = btn.textContent;
    }
  }

  document.getElementById('btn-save-draft').addEventListener('click',()=>saveReq(false));
  document.getElementById('btn-send-req').addEventListener('click',()=>saveReq(true));
  // Botones del pie — misma lógica
  document.getElementById('btn-cancel-form-b')?.addEventListener('click',()=>{ if (!confirm('¿Cancelar? Se perderán los cambios no guardados.')) return; renderList(false); });
  document.getElementById('btn-save-draft-b')?.addEventListener('click',()=>saveReq(false));
  document.getElementById('btn-send-req-b')?.addEventListener('click',()=>saveReq(true));

  renderItems();
  } catch(err) {
    const container = document.getElementById('view-form');
    if (container) container.innerHTML = '<div style="color:#f87171;background:#1a1f25;border:1px solid #d94040;border-radius:6px;padding:24px;margin:20px;font-family:monospace;font-size:13px"><strong>ERROR en renderForm:</strong><br/>' + err.message + '<br/><br/>' + (err.stack||'').replace(/\n/g,'<br/>') + '</div>';
    console.error('renderForm crash:', err);
  }
}

  if (item.GerAt)       history.push({when:item.GerAt,       what:`${item.Status===S.REJGER?'No aprobada por Gerencia':'Aprobada por Gerencia'} (${item.GerBy})${item.GerNote?' — '+item.GerNote:''}`});

async function uploadAdjunto(reqTitle, prefix, file) {
  const cfg = getCfg();
  const b64f = await new Promise((res,rej)=>{
    const rd=new FileReader(); rd.onload=()=>res(rd.result.split(',')[1]); rd.onerror=rej; rd.readAsDataURL(file);
  });
  const safeName = file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
  const path = 'adjuntos/'+reqTitle+'/'+prefix+'_'+Date.now()+'_'+safeName;
  const rurl = 'https://api.github.com/repos/'+cfg.ghRepo+'/contents/'+path;
  const rs = await fetch(rurl,{method:'PUT',headers:{Authorization:'token '+cfg.ghToken,'Content-Type':'application/json'},body:JSON.stringify({message:prefix+': '+file.name,content:b64f})});
  if(!rs.ok) throw new Error('GitHub '+rs.status);
  const rd2=await rs.json();
  const rawPath=(rd2.content&&rd2.content.path)?rd2.content.path:path;
  return {name:file.name, webUrl:'https://raw.githubusercontent.com/'+cfg.ghRepo+'/main/'+rawPath, id:path};
}

async function doAction(item, fields) {
  await updateItem(item._id, { ...fields, UpdatedAt: isoNow() });
}

function showModal(bodyHtml, title, buttons=[]) {
  const existing = document.getElementById('_modal');
  if (existing) existing.remove();
  const overlay = document.createElement('div');
  overlay.id = '_modal';
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal modal-sm">
      <div class="modal-header">
        <span class="modal-title">${escH(title)}</span>
        <button class="modal-close" id="modal-x">✕</button>
      </div>
      <div class="modal-body">${bodyHtml}</div>
      <div class="modal-footer">
        ${buttons.map((b,i)=>`<button class="btn ${b.cls}" data-bi="${i}">${escH(b.label)}</button>`).join('')}
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#modal-x').addEventListener('click',()=>overlay.remove());
  buttons.forEach((b,i)=>{
    overlay.querySelector(`[data-bi="${i}"]`).addEventListener('click',()=>{
      if (b.cb) b.cb();
      overlay.remove();
    });
  });
}

    filtroDesde = desde || null;
    filtroHasta = hasta || null;
    renderContent(allData, filtroDesde, filtroHasta);
  }

  // Calcula totales por moneda de los ítems de una lista de requisiciones
  function calcTotales(items) {
    const t = {ARS:0, USD:0, EUR:0};
    items.forEach(item=>{
      parseLines(item.LinesJSON).forEach(l=>{
        const c = l.currency||'ARS';
        if (t[c]!==undefined) t[c] += (l.qty||0)*(l.price||0);
      });
    });
    return t;
  }

  // Calcula equivalente ARS usando TC cargado
  function toARS(totales, item) {
    // Usar TC de la req si existe, sino el TC global
    const usdV = (item && item.TCusd) ? parseFloat(item.TCusd) : parseFloat(tcManual.usd_venta)||0;
    const eurV = (item && item.TCeur) ? parseFloat(item.TCeur) : parseFloat(tcManual.eur_venta)||0;
    return totales.ARS + totales.USD*usdV + totales.EUR*eurV;
  }

  function fmt2(n) { return n.toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2}); }

  function monedaCeldas(totales, item, equivOverride) {
    const arsVal = equivOverride !== undefined ? equivOverride : toARS(totales, item);
    const hasTc = equivOverride !== undefined ? equivOverride > 0
      : item ? (item.TCusd || tcManual.usd_venta || item.TCeur || tcManual.eur_venta)
             : (tcManual.usd_venta || tcManual.eur_venta);
    const frozen = equivOverride !== undefined ? false : !!(item && (item.TCusd || item.TCeur));
    const dash = '<span style="color:var(--text2)">—</span>';
    const equivDisplay = arsVal > 0 
      ? '$'+fmt2(arsVal)+(frozen ? '<span style="font-size:9px;color:var(--green);margin-left:3px" title="TC congelado al autorizar">🔒</span>' : (totales.USD>0||totales.EUR>0 ? '<span style="font-size:9px;color:var(--text2);margin-left:2px" title="TC actual">~</span>' : ''))

    return `
      <td class="money" style="font-size:12px;color:var(--text1);min-width:110px">${totales.ARS>0?'$'+fmt2(totales.ARS):dash}</td>
      <td class="money" style="font-size:12px;color:#4caf8a;min-width:90px">${totales.USD>0?fmt2(totales.USD):dash}</td>
      <td class="money" style="font-size:12px;color:#5b8dee;min-width:80px">${totales.EUR>0?fmt2(totales.EUR):dash}</td>

    let pipeline  = all.filter(i=>PIPELINE_STATUSES.includes(i.Status));

    const pending  = filtrados.filter(i=>i.Status===S.APPGER);

        const found=allData.find(i=>i._id===row.dataset.finId);

        if(found){renderDetail(found);showView('detail');}
      });
    });

  // Export CSV fecha a fecha
  function doExport(desde, hasta) {
    const usdV = parseFloat(tcManual.usd_venta)||0;
    const eurV = parseFloat(tcManual.eur_venta)||0;
    let items = allData.filter(i=>[S.APPGER,S.APPFIN,S.REJFIN,S.OC].includes(i.Status));
    if (desde) items = items.filter(i=>(i.CreatedAt||i.SubmittedAt||'').slice(0,10)>=desde);
    if (hasta) items = items.filter(i=>(i.CreatedAt||i.SubmittedAt||'').slice(0,10)<=hasta);

    const rows = [];
    // Encabezado con metadatos del reporte
    rows.push({
      Numero:'REPORTE FINANZAS', Departamento:`Período: ${desde||'inicio'} al ${hasta||'hoy'}`,
      Solicitante:'', Estado:'', CuentaGL:'',CentroCosto:'',
      TotalARS:'',TotalUSD:'',TotalEUR:'',
      TC_USD_Venta:usdV||'', TC_EUR_Venta:eurV||'',
      EquivARS:'',Descripcion:'',Cantidad:'',Unidad:'',Moneda:'',PrecioUnit:'',TotalLinea:'',
      GLCorregido:'',NotaGerencia:'',AprobadoGer:'',FechaGer:'',AprobadoFin:'',FechaFin:'',OC:'',Comprador:''
    });

    items.forEach(item=>{
      const t = calcTotales([item]);
      const arsEquiv = t.ARS + t.USD*usdV + t.EUR*eurV;
      const lines = parseLines(item.LinesJSON);
      lines.forEach((l,idx)=>{
        rows.push({
          Numero:        idx===0?item.Title:'',
          Departamento:  idx===0?item.Dept:'',
          Solicitante:   idx===0?item.RequesterName:'',
          Estado:        idx===0?item.Status:'',
          CuentaGL:      idx===0?item.GLAccount||'':'',
          CentroCosto:   idx===0?item.CostCenter||'':'',
          TotalARS:      idx===0&&t.ARS>0?t.ARS:'',
          TotalUSD:      idx===0&&t.USD>0?t.USD:'',
          TotalEUR:      idx===0&&t.EUR>0?t.EUR:'',
          TC_USD_Venta:  idx===0&&usdV?usdV:'',
          TC_EUR_Venta:  idx===0&&eurV?eurV:'',
          EquivARS:      idx===0&&(usdV||eurV)?arsEquiv:'',
          Descripcion:   l.desc,
          Cantidad:      l.qty,
          Unidad:        l.unit,
          Moneda:        l.currency||'ARS',
          PrecioUnit:    l.price,
          TotalLinea:    (l.qty||0)*(l.price||0),
          GLCorregido:   idx===0&&item.GLCorregido?'SÍ':'',
          NotaGerencia:  idx===0?item.GerNote||'':'',
          AprobadoGer:   idx===0?item.GerBy||'':'',
          FechaGer:      idx===0?fmtDT(item.GerAt):'',
          AprobadoFin:   idx===0?item.FinBy||'':'',
          FechaFin:      idx===0?fmtDT(item.FinAt||''):'',
          OC:            idx===0?item.OCNumber||'':'',
          Comprador:     idx===0?item.Buyer||'':''
        });
      });
    });

    const fname = `Finanzas_${desde||'inicio'}_al_${hasta||hoy}.csv`;
    exportCSV(rows, fname);
    toast(`CSV exportado — ${items.length} requisiciones`, 'success');
  }

  // Eventos
  document.getElementById('fin-refresh').addEventListener('click', load);
  document.getElementById('fin-tc-edit').addEventListener('click', showTCEditor);
  document.getElementById('fin-aplicar').addEventListener('click',()=>{
    const desde = document.getElementById('fin-desde').value;
    const hasta = document.getElementById('fin-hasta').value;
    aplicarFiltro(desde||null, hasta||null);
  });
  document.getElementById('fin-todo').addEventListener('click',()=>{
    document.getElementById('fin-desde').value='';
    document.getElementById('fin-hasta').value='';
    aplicarFiltro(null,null);
  });
  document.getElementById('fin-export').addEventListener('click',()=>{
    const desde = document.getElementById('fin-desde').value||null;
    const hasta = document.getElementById('fin-hasta').value||null;
    doExport(desde, hasta);
  });

  load();
}

      </div>
    </div>
    <div id="dash-loading" class="loading-overlay"><div class="loader"></div> Cargando datos…</div>
    <div id="dash-content" class="hidden"></div>
  `;

  // Cargar Chart.js solo cuando se necesita
  function loadChartJS(cb) {
    if (window.Chart) { cb(); return; }
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js';
    s.onload = cb;
    s.onerror = () => {
      // CDN bloqueado — mostrar igual sin gráficos
      window.Chart = null;
      cb();
    };
    document.head.appendChild(s);
  }

  async function load() {
    document.getElementById('dash-loading').classList.remove('hidden');
    document.getElementById('dash-content').classList.add('hidden');
    loadChartJS(async () => {
      try {
        await loadItems();
        renderDashContent();
      } catch(e) {
        toast('Error cargando análisis: '+e.message,'error');
      } finally {
        document.getElementById('dash-loading').classList.add('hidden');
      }
    });
  }

    const app2     = items.filter(i=>[S.APP2,S.APP2NOGER,S.APPGER,S.APPFIN].includes(i.Status)).length;
    const rejected = items.filter(i=>[S.REJ1,S.REJ2,S.REJGER,S.REJFIN].includes(i.Status)).length;
    const mine     = items.filter(i=>i.RequesterMail===currentUser.username).length;
    const criticas = items.filter(i=>i.Urgency==='Crítica'&&(i.Status===S.SENT||i.Status===S.APP1)).length;

    // By status
    const byStatus = {};
    Object.values(S).forEach(s=>byStatus[s]=0);
    items.forEach(i=>byStatus[i.Status]=(byStatus[i.Status]||0)+1);

    // By dept
    const byDept = {};

function generateActivationUrl(cfg) {
  const payload = JSON.stringify({ ghToken: cfg.ghToken, ghRepo: cfg.ghRepo });
  const encoded = encodeURIComponent(btoa(unescape(encodeURIComponent(payload))));
  return window.location.href.split('?')[0].split('#')[0] + '?activar=' + encoded;
}

let _lastNotifCheck = Date.now();
let _notifKnownIds = new Set();
let _notifInterval = null;

async function requestNotifPermission() {
  if (!('Notification' in window)) return false;
  if (Notification.permission === 'granted') return true;
  if (Notification.permission === 'denied') return false;
  const perm = await Notification.requestPermission();
  return perm === 'granted';
}

function sendNotif(title, body, tag) {
  if (Notification.permission !== 'granted') return;
  const n = new Notification(title, {
    body, tag: tag||'metagal-req',
    icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" rx="6" fill="%23f0b030"/><text x="16" y="22" font-size="18" text-anchor="middle" fill="%23000">📋</text></svg>'
  });
  n.onclick = () => { window.focus(); n.close(); };
}

async function checkForUpdates() {
  if (!currentUser) return;
  try {
    const all = await readDB();
    const email = currentUser.username.toLowerCase();
    const role = userRole;
    let newCount = 0;

    all.forEach(item => {
      if (_notifKnownIds.has(item.id||item._id)) return;
      _notifKnownIds.add(item.id||item._id);
      if (_lastNotifCheck === 0) return; // primera carga, no notificar todo
      
      const isOwn = (item.RequesterMail||'').toLowerCase() === email;
      const isApprover = role==='approver'||role==='admin';
      const isGerente = role==='gerente';
      const isFin = role==='finanzas';

      // Notificar al solicitante cuando cambia el estado de su requisicion
      if (isOwn && item.UpdatedAt && new Date(item.UpdatedAt) > new Date(_lastNotifCheck)) {
        sendNotif('Requisicion ' + item.Title, 'Estado: ' + item.Status, item.id||item._id);
        newCount++;
      }
      // Notificar al aprobador cuando hay nuevas pendientes
      if (isApprover && item.Status===S.SENT) {
        sendNotif('Nueva requisicion pendiente', item.Title + ' — ' + (item.RequesterName||''), 'new-'+item.id);
        newCount++;
      }
      if (isGerente && item.Status===S.APP2) {
        sendNotif('Requisicion pendiente de Gerencia', item.Title, 'ger-'+item.id);
        newCount++;
      }
      if (isFin && (item.Status===S.APPGER||item.Status===S.APP2NOGER)) {
        sendNotif('Requisicion pendiente en Finanzas', item.Title, 'fin-'+item.id);
        newCount++;
      }
    });
    _lastNotifCheck = Date.now();
  } catch(_) {}
}

function startNotifPolling() {
  if (_notifInterval) return;
  // Carga inicial de IDs conocidos sin notificar
  readDB().then(all => {
    all.forEach(i => _notifKnownIds.add(i.id||i._id));
    _lastNotifCheck = Date.now();
  }).catch(()=>{});
  // Revisar cada 2 minutos
  _notifInterval = setInterval(checkForUpdates, 2*60*1000);
}

function stopNotifPolling() {
  if (_notifInterval) { clearInterval(_notifInterval); _notifInterval=null; }
}


async function bootstrap() {
  // Registrar Service Worker para PWA
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }
  try {
    document.getElementById('footer-year').textContent = new Date().getFullYear();

    // Procesar link de activación (?activar=BASE64)
    const params = new URLSearchParams(window.location.search);
    if (params.get('activar')) {
      try {
        const raw = decodeURIComponent(params.get('activar'));
        const cfg = JSON.parse(decodeURIComponent(escape(atob(raw))));
        if (cfg.ghToken && cfg.ghRepo) {
          saveCfg({ ghToken: cfg.ghToken, ghRepo: cfg.ghRepo });
          window.history.replaceState({}, '', window.location.pathname);
          showLoginScreen();
          const errEl = document.getElementById('login-err');
          errEl.style.cssText = 'color:#2ea86b;background:rgba(46,168,107,.1);border:1px solid rgba(46,168,107,.3);border-radius:4px;padding:10px 14px;margin-top:12px;display:block';
          errEl.textContent = '✔ Activacion exitosa! Ya podes iniciar sesion.';
          errEl.classList.remove('hidden');
          return;
        }
      } catch(e) { console.warn('Link invalido:', e); }
    }

    if (window.location.protocol === 'file:') {
      showLoginScreen();
      document.getElementById('login-err').textContent =
        '⚠ El archivo está abierto desde tu computadora. Abrilo desde la URL de GitHub Pages (https://...).';
      document.getElementById('login-err').classList.remove('hidden');
      document.getElementById('btn-login').disabled = true;
      document.getElementById('btn-login').textContent = 'Abrí la URL de GitHub Pages';
      return;
    }

    await msalInstance.initialize();
    await msalInstance.handleRedirectPromise().catch(()=>{});

    const accounts = msalInstance.getAllAccounts();
    if (accounts.length) {
      // Intentar renovar token silenciosamente
      try {
        await msalInstance.acquireTokenSilent({scopes:GRAPH_SCOPES, account:accounts[0]});
      } catch(_) {}
      await initApp(accounts[0]);
    } else {
      showLoginScreen();
    }
  } catch(e) {
    console.error('Bootstrap error:', e);
    showLoginScreen();
    const errEl = document.getElementById('login-err');
    if (errEl) {
      errEl.textContent = 'Error al iniciar: ' + (e.message||'desconocido') + '. Recargá la página.';
      errEl.classList.remove('hidden');
    }
  }
}

function showLoginScreen() {
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
  const btn = document.getElementById('btn-login');
  // Evitar duplicar el listener
  const newBtn = btn.cloneNode(true);
  btn.parentNode.replaceChild(newBtn, btn);
  newBtn.addEventListener('click', async()=>{
    newBtn.disabled=true; newBtn.textContent='Conectando…';
    const errEl = document.getElementById('login-err');
    errEl.classList.add('hidden');

    async function tryLogin(attempt) {
      try {
        if (attempt > 1) {
          localStorage.removeItem('msal.interaction.status');
          await new Promise(r=>setTimeout(r,600));
        }
        const res = await msalInstance.loginPopup({scopes:GRAPH_SCOPES});
        await initApp(res.account);
      } catch(e) {
        const msg = (e.message||'').toLowerCase();
        const code = (e.errorCode||'').toLowerCase();
        if (code==='user_cancelled' || msg.includes('user_cancel') || msg.includes('closed')) {
          newBtn.disabled=false;
          newBtn.textContent='🔑 Iniciar sesion con Microsoft 365';
          return;
        }
        if ((msg.includes('interaction_in_progress')||msg.includes('popup_window_error')) && attempt < 3) {
          newBtn.textContent='Reintentando…';
          await new Promise(r=>setTimeout(r,800));
          return tryLogin(attempt+1);
        }
        errEl.textContent = 'Error: ' + (e.message||e.errorCode||'No se pudo iniciar sesion');
        errEl.classList.remove('hidden');
        newBtn.disabled=false;
        newBtn.textContent='🔑 Iniciar sesion con Microsoft 365';
      }
    }
    await tryLogin(1);
  });
}

async function initApp(account) {
  currentUser = account;
  const email = (account.username||'').toLowerCase();
  if (ROLES_ADMIN.map(r=>r.toLowerCase()).includes(email))       userRole='admin';
  else if (ROLES_APPROVER.map(r=>r.toLowerCase()).includes(email))   userRole='approver';
  else if (ROLES_GERENTE.map(r=>r.toLowerCase()).includes(email))    userRole='gerente';
  else if (ROLES_FINANZAS.map(r=>r.toLowerCase()).includes(email))   userRole='finanzas';
  else userRole='user';
  const canCreate = !ROLES_NO_CREATE.map(r=>r.toLowerCase()).includes(email);

  document.getElementById('user-name').textContent = String(account.name||account.username||'').normalize('NFC');
  // Iniciar notificaciones
  requestNotifPermission().then(ok => { if(ok) startNotifPolling(); });
  document.getElementById('user-role').textContent = {
    admin:'Administrador', approver:'Aprobador N1',
    gerente:'Gerente General', finanzas:'Finanzas',
    user:'Usuario'
  }[userRole];
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');

  document.getElementById('btn-logout').addEventListener('click',()=>{
    msalInstance.logoutPopup({account:currentUser}).then(()=>{
      currentUser=null; allItems=[];
      showLoginScreen();
    });
  });

  document.getElementById('tc-badge').addEventListener('click', showTCEditor);

  buildNav();
  fetchTC();

  // Verificar inactividad en background (no bloquea UI)
  setTimeout(() => checkInactiveReqs(), 3000);

  // Deep-link: si viene ?req=ID desde el mail, abrir esa requisición
  const _reqParam = new URLSearchParams(window.location.search).get('req');
  if (_reqParam) {
    window.history.replaceState({}, '', window.location.pathname);
    // Cargar lista y buscar la req
    const _allItems = await readDB().then(r=>r.map(mapItem)).catch(()=>[]);
    const _target = _allItems.find(x => x.Title === decodeURIComponent(_reqParam));
    if (_target) {
      renderDetail(_target);
      showView('detail');
      return;
    }
  }

  // Token embebido en CFG — no se necesita activación por browser
  if (userRole==='gerente') {
    renderGerenteView(); showView('gerente');
  } else if (userRole==='finanzas') {
    renderFinanzasView(); showView('finanzas');
  } else {
    renderList(false);
  }
}

  function n2(n) { return Number(n||0).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
  function n0(n) { return Number(n||0).toLocaleString('es-AR',{maximumFractionDigits:0}); }

  function buildReport(items) {
    const tcUsd = parseFloat(tcManual.usd_venta)||0;
    const tcEur = parseFloat(tcManual.eur_venta)||0;
    const today = new Date().toISOString().slice(0,10);
    const hoy = new Date().toLocaleDateString('es-AR',{day:'2-digit',month:'short',year:'numeric'});

    // ── CALCULAR TOTALES ──────────────────────────────────
    function calcARS(item) {
      const lines = parseLines(item.LinesJSON||'[]');
      let ars=0,usd=0,eur=0;
      lines.forEach(l=>{ const t=(l.qty||0)*(l.price||0); if(l.currency==='USD')usd+=t; else if(l.currency==='EUR')eur+=t; else ars+=t; });
      const tc_u = parseFloat(item.TCusd)||tcUsd||0;
      const tc_e = parseFloat(item.TCeur)||tcEur||0;
      return {ars, usd, eur, equiv: ars + usd*tc_u + eur*tc_e};
    }

    // ── ESTADOS ──────────────────────────────────────────
    const byStatus = {};
    items.forEach(i=>{ byStatus[i.Status]=(byStatus[i.Status]||0)+1; });

    const aprobadas = items.filter(i=>[S.APP2,S.APP2NOGER,S.APPGER,S.APPFIN,S.OC].includes(i.Status));
    const conOC     = items.filter(i=>i.Status===S.OC);
    const pendientes= items.filter(i=>[S.SENT,S.APP1].includes(i.Status));
    const rechazadas= items.filter(i=>[S.REJ1,S.REJ2,S.REJGER,S.REJFIN].includes(i.Status));

    // ── TOTALES MONETARIOS ───────────────────────────────
    const totalEquiv = aprobadas.reduce((s,i)=>s+calcARS(i).equiv,0);
    const totalOCEquiv = conOC.reduce((s,i)=>s+calcARS(i).equiv,0);

    // ── POR DEPARTAMENTO ─────────────────────────────────
    const byDept = {};
    items.forEach(i=>{ if(!byDept[i.Dept])byDept[i.Dept]={count:0,equiv:0}; byDept[i.Dept].count++; byDept[i.Dept].equiv+=calcARS(i).equiv; });
    const deptsSorted = Object.entries(byDept).sort((a,b)=>b[1].equiv-a[1].equiv).slice(0,10);

    // ── POR PROVEEDOR ─────────────────────────────────────
    const byProv = {};
    aprobadas.forEach(i=>{
      const p = i.SelectedVendor||i.Vendor||'Sin proveedor';
      if(!byProv[p])byProv[p]={count:0,equiv:0};
      byProv[p].count++; byProv[p].equiv+=calcARS(i).equiv;
    });
    const provsSorted = Object.entries(byProv).filter(x=>x[0]!=='Sin proveedor').sort((a,b)=>b[1].equiv-a[1].equiv).slice(0,10);

    // ── EVOLUCIÓN MENSUAL ─────────────────────────────────
    const byMonth = {};
    items.forEach(i=>{
      const d=(i.CreatedAt||i.SubmittedAt||'').slice(0,7);
      if(!d)return;
      if(!byMonth[d])byMonth[d]={count:0,equiv:0,aprobadas:0};
      byMonth[d].count++;
      byMonth[d].equiv+=calcARS(i).equiv;
      if([S.APP2,S.APP2NOGER,S.APPGER,S.APPFIN,S.OC].includes(i.Status))byMonth[d].aprobadas++;
    });
    const months = Object.keys(byMonth).sort().slice(-12);

    // ── POR MONEDA ────────────────────────────────────────
    let totalARS2=0,totalUSD2=0,totalEUR2=0;
    aprobadas.forEach(i=>{ const t=calcARS(i); totalARS2+=t.ars; totalUSD2+=t.usd; totalEUR2+=t.eur; });

    // ── URGENCIAS ─────────────────────────────────────────
    const byUrg = {};
    items.forEach(i=>{ byUrg[i.Urgency]=(byUrg[i.Urgency]||0)+1; });

    // ── TASA APROBACION ───────────────────────────────────
    const procesadas = items.filter(i=>i.Status!==S.DRAFT);
    const tasaAprobacion = procesadas.length ? Math.round((aprobadas.length/procesadas.length)*100) : 0;

    // ── PERIODO ───────────────────────────────────────────
    const fechas = items.map(i=>(i.CreatedAt||i.SubmittedAt||'')).filter(Boolean).sort();
    const periodoStr = fechas.length ? `${fechas[0].slice(0,7)} → ${fechas[fechas.length-1].slice(0,7)}` : 'Sin datos';

    document.getElementById('rpt-period').textContent = periodoStr;

  load();
}

// ── Inactivity / expiration check (90 days)
async function checkInactiveReqs() {
  if (userRole !== 'admin') return;
  try {
    const rawItems = await readDB();
    const items = rawItems.map(mapItem);
    const PIPELINE = [S.SENT, S.APP1, S.APP2, S.APP2NOGER, S.APPGER, S.APPFIN];
    const DAYS = 90;
    const now = Date.now();
    const toInactivate = items.filter(i => {
      if (!PIPELINE.includes(i.Status)) return false;
      const dates = [i.CreatedAt, i.SubmittedAt, i.Lvl1At, i.Lvl2At, i.GerAt, i.FinAt, i.UpdatedAt]
        .filter(Boolean).map(d => new Date(d).getTime());
      if (!dates.length) return false;
      const lastActivity = Math.max(...dates);
      return (now - lastActivity) > DAYS * 24 * 60 * 60 * 1000;
    });
    for (const item of toInactivate) {
      await doAction(item, { Status: S.INACTIVE, UpdatedAt: isoNow() });
      // Determine who to notify
      const pendingApprover = (() => {
        if (item.Status === S.SENT) return ROLES_APPROVER[0];
        if (item.Status === S.APP1 || item.Status === S.APP2 || item.Status === S.APP2NOGER) return ROLES_ADMIN[0];
        if (item.Status === S.APPGER) return ROLES_GERENTE[0];
        return ROLES_ADMIN[0];
      })();
      const notifyList = [...new Set([item.RequesterMail, ROLES_ADMIN[0], pendingApprover].filter(Boolean))];
      const updItem = {...item, Status: S.INACTIVE};
      await notificar(updItem,
        '⚠ Requisición marcada como Inactiva por inactividad (90 días)',
        `La requisición ${item.Title} no tuvo movimiento por más de 90 días y fue marcada como Inactiva. Puede reactivarse desde el sistema.`,
        notifyList
      );
    }
    if (toInactivate.length > 0) {
      console.log(`[Inactividad] ${toInactivate.length} req(s) marcadas como inactivas`);
    }
  } catch(e) { console.warn('checkInactiveReqs error:', e.message); }
}
