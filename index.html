<script>
// ── Implementación OAuth2 PKCE embebida (sin dependencias externas) ──
const msal = {
  PublicClientApplication: class {
    constructor(cfg) {
      this.cfg = cfg;
      this._sk = 'mgal_' + cfg.auth.clientId.slice(0,8);
    }
    async initialize() {}
    async handleRedirectPromise() { return null; }
    getAllAccounts() {
      try { const d = localStorage.getItem(this._sk+'_acc'); return d?[JSON.parse(d)]:[];} catch{return [];}
    }
    async acquireTokenSilent({scopes}) {
      try {
        const d = localStorage.getItem(this._sk+'_tok');
        if (!d) throw new Error('no token');
        const t = JSON.parse(d);
        if (Date.now() < t.exp - 90000) return {accessToken:t.at};
        if (t.rt) return await this._refresh(t.rt, scopes);
        throw new Error('expired');
      } catch(e) { throw e; }
    }
    async _refresh(rt, scopes) {
      const s = [...new Set([...scopes,'offline_access'])];
      const r = await fetch(`${this.cfg.auth.authority}/oauth2/v2.0/token`,{
        method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'},
        body: new URLSearchParams({client_id:this.cfg.auth.clientId,grant_type:'refresh_token',refresh_token:rt,scope:s.join(' ')})
      });
      const d = await r.json();
      if (d.error) throw new Error(d.error_description||d.error);
      this._save(d); return {accessToken:d.access_token};
    }
    async loginPopup({scopes}) { return this._popup(scopes); }
    async acquireTokenPopup({scopes}) { return this._popup(scopes); }
    async logoutPopup() {
      localStorage.removeItem(this._sk+'_acc');
      localStorage.removeItem(this._sk+'_tok');
      const url = `${this.cfg.auth.authority}/oauth2/v2.0/logout?post_logout_redirect_uri=${encodeURIComponent(this.cfg.auth.redirectUri)}`;
      const p = window.open(url,'_blank','width=500,height=600');
      await new Promise(res=>setTimeout(res,2000));
      if(p&&!p.closed) p.close();
    }
    async _popup(scopes) {
      const ver = this._ver(); const chal = await this._chal(ver);
      const state = this._rnd(16); const nonce = this._rnd(16);
      const s = [...new Set([...scopes,'openid','profile','offline_access'])];
      sessionStorage.setItem(this._sk+'_ver',ver);
      sessionStorage.setItem(this._sk+'_st',state);
      const authUrl = `${this.cfg.auth.authority}/oauth2/v2.0/authorize?`+new URLSearchParams({
        client_id:this.cfg.auth.clientId,response_type:'code',
        redirect_uri:this.cfg.auth.redirectUri,scope:s.join(' '),
        state,nonce,code_challenge:chal,code_challenge_method:'S256',prompt:'select_account'
      });
      const popup = window.open(authUrl,'_msal_popup','width=520,height=680,scrollbars=yes,resizable=yes');
      if (!popup) throw new Error('El navegador bloqueó la ventana emergente. Permitilas para este sitio.');
      return new Promise((res,rej)=>{
        const tid = setInterval(async()=>{
          try {
            if (popup.closed) { clearInterval(tid); rej(new Error('Ventana cerrada por el usuario')); return; }
            let href;
            try { href = popup.location.href; } catch{ return; }
            const redir = this.cfg.auth.redirectUri;
            if (href && (href.startsWith(redir+'?') || href.startsWith(redir+'#') || href===redir || href.includes('code='))) {
              clearInterval(tid);
              const u = new URL(href);
              const code = u.searchParams.get('code');
              const st2  = u.searchParams.get('state');
              const err  = u.searchParams.get('error');
              try { popup.close(); } catch{}
              if (err) { rej(new Error(u.searchParams.get('error_description')||err)); return; }
              const saved = sessionStorage.getItem(this._sk+'_st');
              if (saved && st2 && saved!==st2) { rej(new Error('State mismatch — intentá de nuevo')); return; }
              try { const r = await this._exchange(code, scopes); res(r); }
              catch(e) { rej(e); }
            }
          } catch{}
        }, 300);
      });
    }
    async _exchange(code, scopes) {
      const ver = sessionStorage.getItem(this._sk+'_ver');
      const s = [...new Set([...(scopes||[]),'openid','profile','offline_access'])];
      const r = await fetch(`${this.cfg.auth.authority}/oauth2/v2.0/token`,{
        method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'},
        body: new URLSearchParams({client_id:this.cfg.auth.clientId,grant_type:'authorization_code',
          code,redirect_uri:this.cfg.auth.redirectUri,code_verifier:ver,scope:s.join(' ')})
      });
      const d = await r.json();
      if (d.error) throw new Error(d.error_description||d.error);
      const acc = this._parseAcc(d);
      this._save(d);
      localStorage.setItem(this._sk+'_acc', JSON.stringify(acc));
      return {accessToken:d.access_token, account:acc};
    }
    _save(d) {
      localStorage.setItem(this._sk+'_tok', JSON.stringify({
        at:d.access_token, rt:d.refresh_token||'',
        exp: Date.now()+(d.expires_in||3600)*1000
      }));
    }
    _parseAcc(d) {
      let c={};
      try { c=JSON.parse(atob(d.id_token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))); } catch{}
      return {username:c.preferred_username||c.upn||c.email||'', name:String(c.name||'').normalize('NFC'), idTokenClaims:c};
    }
    _ver() {
      const a=new Uint8Array(32); crypto.getRandomValues(a);
      return btoa(String.fromCharCode(...a)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
    }
    async _chal(v) {
      const h=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(v));
      return btoa(String.fromCharCode(...new Uint8Array(h))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
    }
    _rnd(n) {
      const a=new Uint8Array(n); crypto.getRandomValues(a);
      return Array.from(a,b=>b.toString(16).padStart(2,'0')).join('');
    }
  }
};

// Santiago configura repo+token en Init y genera link de activacion.

const DB_GITHUB_FILE = 'requisiciones.json';

function getCfg() {
  try {
    const stored = JSON.parse(localStorage.getItem('mgal_cfg')||'{}');
    // Si no hay token guardado, usar el embebido en CFG (funciona en cualquier browser)
    if (!stored.ghToken && CFG.GH_TOKEN && !CFG.GH_TOKEN.startsWith('__')) {
      stored.ghToken = CFG.GH_TOKEN;
    }
    if (!stored.ghRepo && CFG.GH_REPO && !CFG.GH_REPO.startsWith('__')) {
      stored.ghRepo = CFG.GH_REPO;
    }
    return stored;
  } catch(e) { return {}; }
}
function saveCfg(obj) {
  localStorage.setItem('mgal_cfg', JSON.stringify({...getCfg(),...obj}));
}
function githubHeaders(token) {
  return {
    'Authorization': 'token ' + token,
    'Accept': 'application/vnd.github.v3+json',
    'Content-Type': 'application/json'
  };
}

async function readDB() {
  const cfg = getCfg();
  if (!cfg.ghToken || !cfg.ghRepo) throw new Error('Sin configuracion. Pedile a Santiago el link de activacion.');
  const url = 'https://api.github.com/repos/' + cfg.ghRepo + '/contents/' + DB_GITHUB_FILE;
  const res = await fetch(url, { headers: githubHeaders(cfg.ghToken) });
  if (res.status === 404) return [];
  if (!res.ok) {
    const e = await res.json().catch(()=>({}));
    throw new Error('GitHub ' + res.status + ': ' + (e.message||'error leyendo datos'));
  }
  const data = await res.json();
  const b64 = data.content.replace(/\n/g,'');
  const bytes = Uint8Array.from(atob(b64), ch => ch.charCodeAt(0));
  return JSON.parse(new TextDecoder('utf-8').decode(bytes));
}

async function writeDB(data) {
  const cfg = getCfg();
  if (!cfg.ghToken || !cfg.ghRepo) throw new Error('Sin configuracion.');
  const url = 'https://api.github.com/repos/' + cfg.ghRepo + '/contents/' + DB_GITHUB_FILE;
  let sha = null;
  const getRes = await fetch(url, { headers: githubHeaders(cfg.ghToken) });
  if (getRes.ok) { sha = (await getRes.json()).sha; }
  else if (getRes.status !== 404) {
    const e = await getRes.json().catch(()=>({}));
    throw new Error('GitHub ' + getRes.status + ': ' + (e.message||'error'));
  }
  const jsonStr = JSON.stringify(data, null, 2);
  const bytes2 = new TextEncoder().encode(jsonStr);
  let b64str = ''; bytes2.forEach(b => b64str += String.fromCharCode(b));
  const content = btoa(b64str);
  const body = { message: 'update', content };
  if (sha) body.sha = sha;
  const res = await fetch(url, { method:'PUT', headers:githubHeaders(cfg.ghToken), body:JSON.stringify(body) });
  if (!res.ok) {
    const e = await res.json().catch(()=>({}));
    throw new Error('GitHub ' + res.status + ': ' + (e.message||'error guardando'));
  }
  return res.json();
}

async function setupGitHubStorage(ghToken, ghRepo) {
  const repoRes = await fetch('https://api.github.com/repos/' + ghRepo, { headers: githubHeaders(ghToken) });
  if (!repoRes.ok) {
    const e = await repoRes.json().catch(()=>({}));
    throw new Error('No se pudo acceder al repo: ' + (e.message||repoRes.status));
  }
  const fileRes = await fetch(
    'https://api.github.com/repos/' + ghRepo + '/contents/' + DB_GITHUB_FILE,
    { headers: githubHeaders(ghToken) }
  );
  if (fileRes.status === 404) {
    await fetch('https://api.github.com/repos/' + ghRepo + '/contents/' + DB_GITHUB_FILE, {
      method: 'PUT', headers: githubHeaders(ghToken),
      body: JSON.stringify({ message: 'init', content: btoa('[]') })
    });
  }
  saveCfg({ ghToken, ghRepo });
  return { ghToken, ghRepo };
}

async function graphReq(method, url, body = null) {
  const token = await getToken();
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json', Accept: 'application/json', Authorization: `Bearer ${token}` }
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch('https://graph.microsoft.com/v1.0' + url, opts);
  if (!res.ok) {
    const err = await res.json().catch(() => ({ error: { message: res.statusText } }));
    throw new Error(err?.error?.message || res.statusText);
  }
  const ct = res.headers.get('content-type') || '';
  if (ct.includes('json')) return res.json();
  return null;
}

async function sendMail(toArr, subject, htmlBody) {
  try {
    const recipients = (Array.isArray(toArr) ? toArr : [toArr])
      .filter(Boolean).map(a => ({ emailAddress: { address: a } }));
    if (!recipients.length) return;
    await graphReq('POST', '/me/sendMail', {
      message: { subject, body: { contentType: 'HTML', content: htmlBody }, toRecipients: recipients },
      saveToSentItems: false,
    });
  } catch(e) { console.warn('Mail no enviado:', e.message); }
}

async function generateNumber(dept) {
  const code = DEPT_BY_NAME[dept]?.code || dept;
  const year  = new Date().getFullYear();
  const prefix = `${code}-${year}-`;

  // Reintentar hasta 5 veces en caso de colision
  for (let attempt = 0; attempt < 5; attempt++) {
    if (attempt > 0) await new Promise(r => setTimeout(r, 200 + Math.random() * 300));
    const data = await readDB();
    let max = 0;
    data.forEach(i => {
      const t = i.Title || '';
      if (t.startsWith(prefix)) {
        const parts = t.split('-');
        const n = parseInt(parts[parts.length - 1], 10);
        if (!isNaN(n) && n > max) max = n;
      }
    });
    const candidate = `${code}-${year}-${String(max + 1).padStart(6, '0')}`;
    // Verificar que el numero no exista ya (proteccion contra condicion de carrera)
    const exists = data.some(i => i.Title === candidate);
    if (!exists) return candidate;
  }
  // Fallback con timestamp para garantizar unicidad
  const ts = Date.now().toString().slice(-6);
  return `${code}-${year}-T${ts}`;
}

function toast(msg, type='info', dur=4000) {
  const c = document.getElementById('toast-container');
  const d = document.createElement('div');
  d.className = `toast toast-${type}`;
  d.textContent = msg;
  c.appendChild(d);
  setTimeout(()=>{d.style.opacity='0';d.style.transition='opacity .3s';setTimeout(()=>d.remove(),400);}, dur);
}

function fmt(date) {
  if (!date) return '—';
  try {
    return new Date(date).toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'});
  } catch{return '—';}
}
function fmtDT(date) {
  if (!date) return '—';
  try {
    return new Date(date).toLocaleString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
  } catch{return '—';}
}
function isoNow() { return new Date().toISOString(); }
function escH(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function getBadgeClass(status) {
  return STATUS_BADGE[status] || 'badge-draft';
}

function getUrgencyBadge(u) {
  if (u==='Crítica') return 'badge-critical';
  if (u==='Alta') return 'badge-high';
  return 'badge-normal';
}

// Para busquedas sin acento
function normalizeStr(s) {
  if (!s) return '';
  try { return String(s).normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase(); }
  catch(e) { return String(s).toLowerCase(); }
}

// Corrige texto que viene descompuesto de Microsoft (NFD -> NFC)
function fixEncoding(s) {
  if (!s) return '';
  try { return String(s).normalize('NFC'); }
  catch(e) { return String(s); }
}

function _normalizeStatus(s) {
  // Mapeo de strings legacy (guardados en GitHub antes del renombrado) a los nuevos
  const LEGACY = {
    'Enviada (Pendiente Nivel 1)':             'Pendiente revisión',
    'Enviada':                                 'Pendiente revisión',
    'Rechazada Nivel 1':                       'Devuelta por Compras',
    'Aprobada Nivel 1 (Pendiente Nivel 2)':    'Revisada · En gestión',
    'Rechazada Nivel 2':                       'No autorizada',
    'Aprobada N2 (Pendiente Gerencia)':        'Autorizada · Pendiente Gerencia',
    'Aprobada N2 (Pendiente OC)':              'Autorizada · Lista para OC',
    'Rechazada por Gerencia':                  'No autorizada por Gerencia',
    'Aprobada Gerencia (Pendiente Finanzas)':  'Aprobada por Gerencia',
    'Rechazada por Finanzas':                  'Observada por Finanzas',
    'Aprobada por Finanzas':                   'OK Financiero',
  };
  return LEGACY[s] || s;
}

function mapItem(raw) {
  return {
    _id:          raw.id || raw._id || '',
    Title:        raw.Title||'',
    Dept:         fixEncoding(raw.Dept||''),
    RequesterName:fixEncoding(raw.RequesterName||''),
    RequesterMail:raw.RequesterMail||'',
    GLAccount:    raw.GLAccount||'',
    CostCenter:   raw.CostCenter||'',
    Urgency:      fixEncoding(raw.Urgency||'Normal'),
    Justification:fixEncoding(raw.Justification||''),
    Vendor:       fixEncoding(raw.Vendor||''),
    NeedBy:       raw.NeedBy||'',
    Status:       _normalizeStatus(raw.Status)||S.DRAFT,
    LinesJSON:    raw.LinesJSON||'[]',
    AttachmentsJSON:raw.AttachmentsJSON||'[]',
    CommentsJSON:   raw.CommentsJSON||'[]',
    GerAt:          raw.GerAt||'',
    GerBy:          raw.GerBy||'',
    GerNote:        fixEncoding(raw.GerNote||''),
    GLCorregido:    raw.GLCorregido||false,
    FinDestinatarios:raw.FinDestinatarios||'',
    FinAt:          raw.FinAt||'',
    FinBy:          raw.FinBy||'',
    FinNote:        fixEncoding(raw.FinNote||''),
    RequiereGerencia: raw.RequiereGerencia||false,
    SelectedVendor:   raw.SelectedVendor||'',
    VendorCriteria:   raw.VendorCriteria||'',
    SubmittedAt:  raw.SubmittedAt||'',
    Lvl1At:       raw.Lvl1At||'',
    Lvl1By:       raw.Lvl1By||'',
    Lvl1Note:     raw.Lvl1Note||'',
    Lvl2At:       raw.Lvl2At||'',
    Lvl2By:       raw.Lvl2By||'',
    Lvl2Note:     raw.Lvl2Note||'',
    OCNumber:     raw.OCNumber||'',
    OCDate:       raw.OCDate||'',
    Buyer:        raw.Buyer||'',
    CreatedAt:    raw.CreatedAt||'',
    UpdatedAt:    raw.UpdatedAt||'',
  };
}

function parseLines(json) {
  try { return JSON.parse(json)||[]; } catch{ return []; }
}
function parseAttachments(json) {
  try { return JSON.parse(json)||[]; } catch{ return []; }
}
function parseComments(json) {
  try { return JSON.parse(json)||[]; } catch{ return []; }
}

function canEditDraft(item) {
  if (userRole === 'admin') return true;
  const isOwner = item.RequesterMail === currentUser?.username;
  const st = _normalizeStatus(item.Status);
  const editableStatuses = [S.DRAFT, S.REJ1, S.REJ2, S.REJGER, S.REJFIN];
  return isOwner && editableStatuses.includes(st);
}

function exportCSV(rows, filename) {
  if (!rows.length) return;
  const keys = Object.keys(rows[0]);
  const hdr = keys.map(k=>'"'+k+'"').join(',');
  const body = rows.map(r=>keys.map(k=>'"'+String(r[k]||'').replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+hdr+'\n'+body],{type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

async function loadItems() {
  const rawItems = await readDB();
  const mapped = rawItems.map(mapItem);
  if (userRole==='admin' || userRole==='approver') {
    allItems = mapped; // ven todas
  } else if (userRole==='gerente') {
    allItems = mapped.filter(i=>
      i.RequiereGerencia===true && [S.APP2,S.APPGER,S.REJGER].includes(i.Status)
    );
  } else if (userRole==='finanzas') {
    allItems = mapped.filter(i=>
      [S.APPGER,S.APPFIN,S.REJFIN,S.OC].includes(i.Status)
    );
  } else {
    allItems = mapped.filter(i=>i.RequesterMail===currentUser.username);
  }
  return allItems;
}

const VIEWS = ['list','form','detail','dashboard','gerente','finanzas','init'];
function showView(name) {
  VIEWS.forEach(v=>document.getElementById('view-'+v).classList.add('hidden'));
  document.getElementById('view-'+name).classList.remove('hidden');
}

function buildNav() {
  const nav = document.getElementById('nav');
  const email = (currentUser?.username||'').toLowerCase();
  const canCreate = !ROLES_NO_CREATE.map(r=>r.toLowerCase()).includes(email);
  const btns = [];
  const listaLabel = (userRole==='admin'||userRole==='approver') ? '📋 Todas las Requisiciones' : '📋 Mis Requisiciones';
  btns.push({view:'list', label:listaLabel});
  if (canCreate) btns.push({view:'form', label:'➕ Nueva'});
  if (userRole==='approver') btns.push({view:'list', label:'📥 Aprobaciones N1', extra:'approvals'});
  if (userRole==='finanzas') btns.push({view:'finanzas', label:'💰 Vista Finanzas'});
  if (userRole==='gerente')  btns.push({view:'gerente',  label:'📊 Reporte Gerencia'});
  if (userRole==='admin') {
    btns.push({view:'list',     label:'📥 Aprobaciones N2',  extra:'approvals'});
    btns.push({view:'gerente',  label:'🏢 Vista Gerencia'});
    btns.push({view:'finanzas', label:'💰 Vista Finanzas'});
    btns.push({view:'dashboard',label:'📈 Análisis'});
    btns.push({view:'init',     label:'⚙ Inicialización'});
  }
  nav.innerHTML = btns.map(b=>`
    <button class="nav-btn" data-view="${b.view}" data-extra="${b.extra||''}">${b.label}</button>
  `).join('');
  nav.querySelectorAll('.nav-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      if (btn.dataset.extra==='approvals') {
        renderList(true);
        showView('list');
      } else if (btn.dataset.view==='form') {
        renderForm(null); showView('form');
      } else if (btn.dataset.view==='dashboard') {
        renderDashboard(); showView('dashboard');
      } else if (btn.dataset.view==='init') {
        renderInit(); showView('init');
      } else if (btn.dataset.view==='finanzas') {
        renderFinanzasView(); showView('finanzas');
      } else if (btn.dataset.view==='gerente') {
        renderGerenteView(); showView('gerente');
      } else {
        renderList(false); showView('list');
      }
      document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));
      btn.classList.add('active');
    });
  });
}

function renderList(approvalsMode=false) {
  showView('list');
  const container = document.getElementById('view-list');

  // Build filter bar

  container.innerHTML = `
    <div class="section-header">
      <div>
        <div class="section-title">${approvalsMode ? 'Aprobaciones Pendientes' : (userRole==='admin'||userRole==='approver') ? 'Todas las Requisiciones' : 'Mis Requisiciones'}</div>

      </div>
      <div class="ml-auto d-flex">
        <button class="btn btn-secondary btn-sm" id="btn-refresh-list">↻ Actualizar</button>

      <input type="text" id="flt-q" placeholder="Buscar..." style="max-width:200px"/>

      <select id="flt-status"><option value="">Todos los estados</option>${statusOptions}</select>
      <select id="flt-urg"><option value="">Toda urgencia</option><option>Normal</option><option>Alta</option><option>Crítica</option></select>
    </div>
    <div id="list-loading" class="loading-overlay"><div class="loader"></div> Cargando…</div>
    <div id="list-table-wrap" class="hidden"></div>
  `;

  async function doLoad() {
    document.getElementById('list-loading').classList.remove('hidden');
    document.getElementById('list-table-wrap').classList.add('hidden');
    try {
      await loadItems();
      const alertsBar = document.getElementById('alerts-bar');
      if (alertsBar) {
        const criticas = allItems.filter(i=>i.Urgency==='Crítica'&&(i.Status===S.SENT||i.Status===S.APP1));
        const vencidas = allItems.filter(i=>i.NeedBy&&new Date(i.NeedBy)<new Date()&&i.Status!==S.OC&&i.Status!==S.DRAFT&&i.Status!==S.REJ1&&i.Status!==S.REJ2);
        let html='';
        if (criticas.length) html+=`<div style="background:rgba(217,64,64,.12);border:1px solid rgba(217,64,64,.3);border-radius:4px;padding:10px 16px;margin-bottom:10px;font-size:13px;color:var(--red)">⚠ <strong>${criticas.length} requisición(es) CRÍTICA(S)</strong> pendiente(s) de aprobación</div>`;
        if (vencidas.length) html+=`<div style="background:rgba(224,98,26,.12);border:1px solid rgba(224,98,26,.3);border-radius:4px;padding:10px 16px;margin-bottom:10px;font-size:13px;color:var(--orange)">📅 <strong>${vencidas.length} requisición(es)</strong> con fecha necesaria vencida y sin OC asignada</div>`;
        alertsBar.innerHTML=html;
      }
      renderTable(approvalsMode);
    } catch(e) {
      toast('Error cargando requisiciones: '+e.message,'error');
    } finally {
      document.getElementById('list-loading').classList.add('hidden');
    }
  }

  function getFiltered(am) {
    const q = (document.getElementById('flt-q')?.value||'').toLowerCase();
    const dept = document.getElementById('flt-dept')?.value||'';
    const status = document.getElementById('flt-status')?.value||'';
    const urg = document.getElementById('flt-urg')?.value||'';
    let items = [...allItems];
    if (am) {
      if (userRole==='approver') items = items.filter(i=>i.Status===S.SENT);
      else if (userRole==='admin') items = items.filter(i=>i.Status===S.APP1);
    }
    const qn=normalizeStr(q); items = items.filter(i=>normalizeStr(i.Title+'|'+i.RequesterName+'|'+i.Dept+'|'+i.Justification+'|'+(i.OCNumber||'')+'|'+(i.Buyer||'')+'|'+(i.GLAccount||'')).includes(qn));
    if (dept) items = items.filter(i=>i.Dept===dept);
    if (status) items = items.filter(i=>i.Status===status);
    if (urg) items = items.filter(i=>i.Urgency===urg);
    return items;
  }

  function renderTable(am) {
    const wrap = document.getElementById('list-table-wrap');
    const items = getFiltered(am);
    document.getElementById('list-count').textContent = `${items.length} registro(s)`;
    if (!items.length) {
      wrap.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📭</div>Sin resultados</div>`;
      wrap.classList.remove('hidden');
      return;
    }
    const rows = items.map(i=>{
      const bc = getBadgeClass(i.Status);
      const ub = getUrgencyBadge(i.Urgency);
      const lines = parseLines(i.LinesJSON);
      const canDel  = userRole==='admin' || ([S.DRAFT,S.SENT].includes(i.Status) && i.RequesterMail===currentUser.username);
      const editableStatuses = [S.DRAFT, S.REJ1, S.REJ2, S.REJGER, S.REJFIN];
      const canEdit = userRole==='admin' || (editableStatuses.includes(i.Status) && i.RequesterMail===currentUser.username);
      const isOverdue = i.NeedBy && new Date(i.NeedBy)<new Date() && i.Status!==S.OC && i.Status!==S.DRAFT && i.Status!==S.REJ1 && i.Status!==S.REJ2;
      const isDraftOld = i.Status===S.DRAFT && i.CreatedAt && ((Date.now()-new Date(i.CreatedAt).getTime())>30*24*60*60*1000);
      return `<tr data-id="${i._id}" class="req-row" style="${isOverdue?'border-left:3px solid var(--orange)':''}">
        <td style="cursor:pointer"><span class="num">${escH(i.Title)}</span>${isOverdue?` <span style="font-size:10px;color:var(--orange)" title="Fecha necesaria vencida">⏰</span>`:''}${isDraftOld?` <span style="font-size:10px;color:var(--yellow)" title="Borrador sin enviar hace más de 30 días">⚠ Borrador antiguo</span>`:''}${parseComments(i.CommentsJSON||'[]').length?` <span style="font-size:10px;color:var(--accent2)" title="Tiene comentarios">💬${parseComments(i.CommentsJSON||'[]').length}</span>`:''}</td>
        <td>${escH(i.Dept)}</td>
        <td>${escH(i.RequesterName)}</td>
        <td><span class="badge ${ub}">${escH(i.Urgency)}</span></td>
        <td><span class="badge ${bc}">${escH(_normalizeStatus(i.Status))}</span></td>
        <td style="font-family:var(--mono);font-size:12px;color:var(--accent2)">${i.OCNumber||'\u2014'}</td>
        <td>${lines.length} ítem(s)</td>
        <td>${fmt(i.NeedBy)}</td>
        <td>${fmt(i.CreatedAt)}</td>
        <td class="text-muted" style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escH(i.Justification).substring(0,60)}</td>
        <td style="white-space:nowrap">
          ${canEdit?`<button class="btn btn-secondary btn-xs btn-edit-row" data-id="${i._id}" title="Editar">✏</button>`:''}
          ${canDel?`<button class="btn btn-danger btn-xs btn-del-row" data-id="${i._id}" title="Eliminar">🗑</button>`:''}
        </td>
      </tr>`;
    }).join('');
    wrap.innerHTML = `
      <div style="overflow-x:auto">
      <table>
        <thead><tr>
          <th>N° Req.</th><th>Departamento</th><th>Solicitante</th><th>Urgencia</th><th>Estado</th><th>Ítems</th><th>Fecha necesaria</th><th>Creada</th><th>Justificación</th><th></th>
        </tr></thead>
        <tbody id="list-tbody">${rows}</tbody>
      </table>
      </div>`;
    wrap.classList.remove('hidden');
    wrap.querySelectorAll('.req-row').forEach(r=>{
      r.addEventListener('dblclick',()=>{
        const item = allItems.find(i=>i._id===r.dataset.id);
        if (item) { renderDetail(item); showView('detail'); }
      });
      r.addEventListener('click',e=>{
        if (e.target.closest('button')) return;
        wrap.querySelectorAll('.req-row').forEach(x=>x.style.background='');
        r.style.background='var(--bg3)';
      });
    });
    wrap.querySelectorAll('.btn-edit-row').forEach(b=>{

        const item = allItems.find(i=>i._id===b.dataset.id);
        if (item) { renderForm(item); showView('form'); }
      });
    });
    wrap.querySelectorAll('.btn-del-row').forEach(b=>{
      b.addEventListener('click',async e=>{
        e.stopPropagation();
        const item = allItems.find(i=>i._id===b.dataset.id);

        if (!confirm(`¿Eliminar la requisición ${item.Title}? Esta acción no se puede deshacer.`)) return;

        } catch(err) {
          toast('Error al eliminar: '+err.message,'error');

  doLoad();
}

  const gerenciaBlock = (userRole==='admin'||userRole==='approver')
    ? '<div class="form-group span2" style="display:flex;align-items:center;gap:12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px">'
      + '<input type="checkbox" id="f-req-ger" style="width:auto;margin:0"' + _gerChecked + '/>'
      + '<div><label style="margin:0;text-transform:none;font-size:13px;color:var(--text0);font-weight:500">Requiere aprobación de Gerencia (Raül López)</label>'
      + '<div style="font-size:11px;color:var(--text2);margin-top:2px">Marcá esta opción para requisiciones de mayor envergadura o monto</div></div></div>'
    : '<input type="hidden" id="f-req-ger" value="false"/>';

  container.innerHTML = `
    <div class="section-header">
      <div>
        <div class="section-title">${isEdit?'Editar Requisición':'Nueva Requisición'}</div>
        ${isEdit && userRole==='admin' && item?.Status!==S.DRAFT ? `<div style="background:rgba(232,160,32,.12);border:1px solid rgba(232,160,32,.4);border-radius:4px;padding:8px 14px;margin-top:8px;font-size:12px;color:var(--accent)">⚠ Editando como Administrador — estado actual: <strong>${escH(item.Status)}</strong></div>` : ''}
        ${item?`<div class="section-sub"><span class="num">${escH(item.Title)}</span></div>`:''}
      </div>
      <div class="ml-auto d-flex" style="opacity:0;pointer-events:none;user-select:none" aria-hidden="true">
        <button class="btn btn-secondary" id="btn-cancel-form" tabindex="-1">Cancelar</button>
        <button class="btn btn-secondary" id="btn-save-draft" tabindex="-1">💾 Guardar borrador</button>
        <button class="btn btn-primary" id="btn-send-req" tabindex="-1">📤 Enviar para aprobación</button>
      </div>
    </div>

    <!-- CABECERA -->
    <div class="form-section">
      <div class="form-section-title">Cabecera</div>
      <div class="form-grid">
        <div class="form-group">
          <label>Departamento *</label>
          <select id="f-dept" required><option value="">Seleccionar…</option>${deptOptions}</select>
        </div>
        <div class="form-group">
          <label>Urgencia *</label>
          <select id="f-urgency">
            <option ${item?.Urgency==='Normal'||!item?'selected':''}>Normal</option>
            <option ${item?.Urgency==='Alta'?'selected':''}>Alta</option>
            <option ${item?.Urgency==='Crítica'?'selected':''}>Crítica</option>
          </select>
        </div>
        <div class="form-group">
          <label>Nombre y Apellido del Solicitante *</label>
          <input type="text" id="f-reqname" value="${escH(defName)}" required/>
        </div>
        <div class="form-group">
          <label>Mail corporativo *</label>
          <input type="email" id="f-reqmail" value="${escH(defMail)}" required/>
        </div>
        <div class="form-group">
          <label>Cuenta contable (GL)</label>
          <input type="text" id="f-gl" value="${escH(item?.GLAccount||'')}"/>
        </div>
        <div class="form-group">
          <label>Centro de costo / Orden</label>
          <input type="text" id="f-cc" value="${escH(item?.CostCenter||'')}"/>
        </div>
        <div class="form-group span2">
          <label>Justificación *</label>
          <textarea id="f-just" rows="3" required>${escH(item?.Justification||'')}</textarea>
        </div>
        <div class="form-group">
          <label>Proveedor sugerido (opcional)</label>
          <input type="text" id="f-vendor" value="${escH(item?.Vendor||'')}"/>
        </div>
        <div class="form-group">
          <label>Fecha necesaria (opcional)</label>
          <input type="date" id="f-needby" value="${item?.NeedBy?item.NeedBy.slice(0,10):''}"/>
        </div>
        ${gerenciaBlock}
      </div>
    </div>

    <!-- ÍTEMS -->
    <div class="form-section">
      <div class="form-section-title">Ítems de la Requisición</div>
      <div class="items-table-wrap">
        <table class="items-table" id="items-tbl">
          <thead><tr>
            <th style="width:35%">Descripción *</th>
            <th style="width:8%">Cant.</th>
            <th style="width:8%">Unidad</th>
            <th style="width:8%">Moneda</th>
            <th style="width:10%">Precio est.</th>
            <th style="width:16%">Link/Ref.</th>
            <th style="width:12%">Observaciones</th>
            <th style="width:3%"></th>
          </tr></thead>
          <tbody id="items-body"></tbody>
        </table>
      </div>
      <button class="btn btn-secondary btn-sm" id="btn-add-item" style="margin-top:8px">+ Agregar ítem</button>
      <div id="items-total" style="text-align:right;font-family:var(--mono);font-size:13px;margin-top:8px;color:var(--text2)"></div>
    </div>

    <!-- ADJUNTOS -->
    <div class="form-section">
      <div class="form-section-title">Adjuntos</div>
      <div id="attach-existing" class="attach-list mb-3"></div>
      <div class="form-group">
        <label>Agregar archivos — PDF, Word, Excel, <strong>imágenes</strong> (JPG, PNG, HEIC), videos</label>
        <input type="file" id="f-files" multiple accept=".pdf,.doc,.docx,.xls,.xlsx,.png,.jpg,.jpeg,.gif,.webp,.bmp,.heic,.mp4,.mov" style="padding:6px"/>
      </div>
      <div id="attach-upload-status" style="font-size:12px;color:var(--text2)"></div>
    </div>

    <!-- ACCIONES PIE -->
    <div class="form-section" style="background:transparent;border:none;padding-top:0">
      <div style="display:flex;justify-content:flex-end;gap:10px;padding:12px 0 4px">
        <button class="btn btn-secondary" id="btn-cancel-form-b">Cancelar</button>
        <button class="btn btn-secondary" id="btn-save-draft-b">💾 Guardar borrador</button>
        <button class="btn btn-primary" id="btn-send-req-b" style="min-width:190px">📤 Enviar para aprobación</button>
      </div>
    </div>
  `;

  // ÍTEMS — fuente única de verdad: el array `lines`
  let lines = parseLines(item?.LinesJSON||'[]');
  if (!lines.length) lines.push({desc:'',qty:1,unit:'UN',currency:'ARS',price:'',link:'',obs:''});

  function readLinesFromDOM() {
    const rows = document.getElementById('items-body')?.querySelectorAll('tr')||[];
    return Array.from(rows).map(r=>({
      desc:     r.querySelector('.il-desc')?.value||'',
      qty:      parseFloat(r.querySelector('.il-qty')?.value)||0,
      unit:     r.querySelector('.il-unit')?.value||'UN',
      currency: r.querySelector('.il-cur')?.value||'ARS',
      price:    parseFloat(r.querySelector('.il-price')?.value)||0,
      link:     r.querySelector('.il-link')?.value||'',
      obs:      r.querySelector('.il-obs')?.value||'',
    }));
  }

  function syncLinesFromDOM() {
    const fromDOM = readLinesFromDOM();
    if (fromDOM.length) lines = fromDOM;
  }

  function renderItems() {
    const tbody = document.getElementById('items-body');
    if (!tbody) return;
    tbody.innerHTML = lines.map((l,i)=>`
      <tr>
        <td><input type="text" class="il-desc" value="${escH(l.desc||'')}" placeholder="Descripción del ítem"/></td>
        <td><input type="number" class="il-qty" value="${escH(String(l.qty||1))}" min="0.01" step="any" style="width:60px"/></td>
        <td><input type="text" class="il-unit" value="${escH(l.unit||'UN')}" style="width:50px"/></td>
        <td><select class="il-cur">
          <option ${(l.currency||'ARS')==='ARS'?'selected':''}>ARS</option>
          <option ${(l.currency||'ARS')==='USD'?'selected':''}>USD</option>
          <option ${(l.currency||'ARS')==='EUR'?'selected':''}>EUR</option>
        </select></td>
        <td><input type="number" class="il-price" value="${escH(String(l.price||''))}" min="0" step="any" style="width:80px"/></td>
        <td><input type="text" class="il-link" value="${escH(l.link||'')}" placeholder="URL o referencia"/></td>
        <td><input type="text" class="il-obs" value="${escH(l.obs||'')}" placeholder="Obs."/></td>
        <td><button class="item-del" data-i="${i}" title="Eliminar">✕</button></td>
      </tr>`).join('');

    tbody.querySelectorAll('.item-del').forEach(b=>{
      b.addEventListener('click',()=>{
        syncLinesFromDOM();
        lines.splice(Number(b.dataset.i),1);
        if (!lines.length) lines.push({desc:'',qty:1,unit:'UN',currency:'ARS',price:'',link:'',obs:''});
        renderItems();
        calcTotal();
      });
    });
    tbody.querySelectorAll('input,select').forEach(el=>{
      el.addEventListener('input', calcTotal);
    });
    calcTotal();
  }

  function getLines() {
    syncLinesFromDOM();
    return lines;
  }

  function calcTotal() {
    const current = readLinesFromDOM();
    const groups = {};
    current.forEach(l=>{
      const c = l.currency||'ARS';
      groups[c] = (groups[c]||0) + (l.qty||0)*(l.price||0);
    });
    const parts = Object.entries(groups).filter(([,v])=>v>0).map(([c,v])=>`${c} ${v.toLocaleString('es-AR',{minimumFractionDigits:2})}`);
    const el = document.getElementById('items-total');
    if (el) el.textContent = parts.length ? 'Total estimado: '+parts.join(' + ') : '';
  }

  // Render existing attachments
  const existAtt = parseAttachments(item?.AttachmentsJSON||'[]');
  if (existAtt.length) {
    document.getElementById('attach-existing').innerHTML = existAtt.map(a=>`
      <div class="attach-item">📎 <a href="${escH(a.webUrl)}" target="_blank">${escH(a.name)}</a></div>
    `).join('');
  }

  document.getElementById('btn-add-item').addEventListener('click',()=>{
    syncLinesFromDOM();
    lines.push({desc:'',qty:1,unit:'UN',currency:'ARS',price:'',link:'',obs:''});
    renderItems();
  });

  document.getElementById('btn-cancel-form').addEventListener('click',()=>{
    renderList(false);
  });

  function validate() {
    const dept   = document.getElementById('f-dept').value;
    const name   = document.getElementById('f-reqname').value.trim();
    const mail   = document.getElementById('f-reqmail').value.trim();
    const just   = document.getElementById('f-just').value.trim();
    const lines  = getLines().filter(l=>l.desc.trim());
    if (!dept) { toast('Seleccioná un departamento','error'); return null; }
    if (!name) { toast('Ingresá nombre del solicitante','error'); return null; }
    if (!mail) { toast('Ingresá mail del solicitante','error'); return null; }
    if (!just) { toast('Ingresá la justificación','error'); return null; }
    if (!lines.length) { toast('Agregá al menos un ítem con descripción','error'); return null; }
    return {dept,name,mail,just,lines};
  }

  async function uploadNewFiles(reqNum) {
    const fileInput = document.getElementById('f-files');
    const files = fileInput?.files||[];
    if (!files.length) return [];
    const folderPath = CFG.DOC_LIB_REL + '/' + reqNum;
    await ensureFolder(folderPath);
    const uploaded = [];
    const status = document.getElementById('attach-upload-status');
    for (let i=0;i<files.length;i++) {
      const f = files[i];
      status.textContent = `Subiendo ${i+1}/${files.length}: ${f.name}…`;
      try {
        const result = await uploadFile(folderPath, f);
        uploaded.push({name:f.name, webUrl:result.webUrl||result['@content.downloadUrl']||'', id:result.id||''});
      } catch(e) {
        toast(`Error subiendo ${f.name}: ${e.message}`,'error');
      }
    }
    status.textContent = '';
    return uploaded;
  }

  async function saveReq(send) {
    const v = validate();
    if (!v) return;
    const btn = send ? document.getElementById('btn-send-req') : document.getElementById('btn-save-draft');
    btn.disabled = true;
    btn.textContent = '⏳ Guardando…';
    try {
      let reqNum = item?.Title;
      if (!reqNum) {
        reqNum = await generateNumber(v.dept);
      }
      const newFiles = await uploadNewFiles(reqNum);
      const allAttach = [...existAtt, ...newFiles];
      const now = isoNow();
      const reqGer = document.getElementById('f-req-ger')?.checked || false;
      const fields = {
        Title:           reqNum,
        Dept:            v.dept,
        RequesterName:   fixEncoding(v.name||''),
        RequesterMail:   v.mail,
        GLAccount:       document.getElementById('f-gl').value.trim(),
        CostCenter:      document.getElementById('f-cc').value.trim(),
        Urgency:         document.getElementById('f-urgency').value,
        Justification:   v.just,
        Vendor:          document.getElementById('f-vendor').value.trim(),
        NeedBy:          document.getElementById('f-needby').value||null,
        RequiereGerencia: reqGer,
        Status:          send ? S.SENT : S.DRAFT,
        LinesJSON:       JSON.stringify(v.lines),
        AttachmentsJSON: JSON.stringify(allAttach),
        UpdatedAt:       now,
      };
      if (send && !item?.SubmittedAt) fields.SubmittedAt = now;
      if (!isEdit) {
        fields.CreatedAt = now;
        const created = await createItem(fields);
        if (send) {
          const fullItem = mapItem({...fields, id: created.id||Date.now().toString()});
          await notificar(fullItem,'📋 Nueva requisición enviada para aprobación','',[ROLES_APPROVER[0], ROLES_ADMIN[0]]);
        }
        toast(`Requisición ${reqNum} ${send?'enviada':'guardada'} correctamente.`,'success');
      } else {
        const wasRejected = [S.REJ1,S.REJ2,S.REJGER,S.REJFIN].includes(item.Status);
        if (send && wasRejected) {
          // Limpiar campos de aprobación anterior y reenviar
          fields.Status = S.SENT;
          fields.SubmittedAt = fields.SubmittedAt || isoNow();
          fields.Lvl1At=''; fields.Lvl1By=''; fields.Lvl1Note='';
          fields.Lvl2At=''; fields.Lvl2By=''; fields.Lvl2Note='';
          fields.GerAt=''; fields.GerBy=''; fields.GerNote='';
          fields.FinAt=''; fields.FinBy=''; fields.FinNote='';
          fields.SelectedVendor=''; fields.VendorCriteria='';
        }
        await updateItem(item._id, fields);
        if (send && (item.Status===S.DRAFT || wasRejected)) {
          const fullItem = mapItem({...item, ...fields});
          const msg = wasRejected ? '📋 Requisición corregida y reenviada para aprobación' : '📋 Requisición enviada para aprobación';
          await notificar(fullItem, msg, '', [ROLES_APPROVER[0], ROLES_ADMIN[0]]);
        }
        toast(`Requisición ${reqNum} ${send?'reenviada':'guardada'} correctamente.`,'success');
      }
      renderList(false);
    } catch(e) {
      toast('Error al guardar: '+e.message,'error');
    } finally {
      btn.disabled = false;
      btn.textContent = send ? '📤 Enviar para aprobación' : '💾 Guardar borrador';
      const btnB = send ? document.getElementById('btn-send-req-b') : document.getElementById('btn-save-draft-b');
      if (btnB) btnB.textContent = btn.textContent;
    }
  }

  document.getElementById('btn-save-draft').addEventListener('click',()=>saveReq(false));
  document.getElementById('btn-send-req').addEventListener('click',()=>saveReq(true));
  // Botones del pie — misma lógica
  document.getElementById('btn-cancel-form-b')?.addEventListener('click',()=>{ if (!confirm('¿Cancelar? Se perderán los cambios no guardados.')) return; renderList(false); });
  document.getElementById('btn-save-draft-b')?.addEventListener('click',()=>saveReq(false));
  document.getElementById('btn-send-req-b')?.addEventListener('click',()=>saveReq(true));

  renderItems();
  } catch(err) {
    const container = document.getElementById('view-form');
    if (container) container.innerHTML = '<div style="color:#f87171;background:#1a1f25;border:1px solid #d94040;border-radius:6px;padding:24px;margin:20px;font-family:monospace;font-size:13px"><strong>ERROR en renderForm:</strong><br/>' + err.message + '<br/><br/>' + (err.stack||'').replace(/\n/g,'<br/>') + '</div>';
    console.error('renderForm crash:', err);
  }
}

// ================================================================
// VISTA: DETALLE / APROBACIÓN
// ================================================================
function renderDetail(item) {
  // Normalizar siempre al entrar, independientemente del origen del item
  item = { ...item, Status: _normalizeStatus(item.Status) };

  showView('detail');
  const container = document.getElementById('view-detail');
  const lines = parseLines(item.LinesJSON);
  const attachments = parseAttachments(item.AttachmentsJSON);
  const bc = getBadgeClass(item.Status);
  const ub = getUrgencyBadge(item.Urgency);

  const canEdit       = canEditDraft(item);
  const canApproveN1  = (userRole==='approver'||userRole==='admin') && item.Status===S.SENT;
  const canApproveN2  = userRole==='admin' && item.Status===S.APP1;
  const canApproveGer = (userRole==='gerente'||userRole==='admin') && item.Status===S.APP2;
  const canApproveFin = (userRole==='finanzas'||userRole==='admin') && item.Status===S.APPGER;
  const canAssignOC   = (userRole==='admin'||userRole==='approver') && [S.APPFIN, S.APP2NOGER].includes(item.Status);
  const canReopen     = userRole==='admin' && [S.REJ1,S.REJ2,S.REJGER,S.REJFIN].includes(item.Status);
  const canCorrect    = [S.REJ1,S.REJ2,S.REJGER,S.REJFIN].includes(item.Status) && item.RequesterMail===currentUser?.username;

  // Line items table
  const linesHtml = lines.map(l=>`
    <tr>
      <td>${escH(l.desc)}</td>
      <td class="money">${Number(l.qty||0).toLocaleString('es-AR')}</td>
      <td>${escH(l.unit||'UN')}</td>
      <td>${escH(l.currency||'ARS')}</td>
      <td class="money">${l.price?Number(l.price).toLocaleString('es-AR',{minimumFractionDigits:2}):'—'}</td>
      <td>${l.link?`<a href="${escH(l.link)}" target="_blank" style="font-size:11px">🔗 Link</a>`:'—'}</td>
      <td>${escH(l.obs||'')}</td>
    </tr>`).join('');

  const attachHtml = attachments.length
    ? attachments.map(a=>`<div class="attach-item">📎 <a href="${escH(a.webUrl)}" target="_blank">${escH(a.name)}</a></div>`).join('')
    : '<div class="text-muted" style="font-size:12px">Sin adjuntos</div>';

  // History
  const history = [];
  if (item.CreatedAt)   history.push({when:item.CreatedAt,   what:`Creada como Borrador`});
  if (item.SubmittedAt) history.push({when:item.SubmittedAt, what:'Enviada a Compras para revisión'});
  if (item.Lvl1At)      history.push({when:item.Lvl1At,      what:`${item.Status===S.REJ1?'Devuelta al solicitante':'Revisada y elevada'} por ${item.Lvl1By}${item.Lvl1Note?' — '+item.Lvl1Note:''}`});
  if (item.Lvl2At)      history.push({when:item.Lvl2At,      what:`${item.Status===S.REJ2?'No autorizada':'Autorizada'} por ${item.Lvl2By}${item.Lvl2Note?' — '+item.Lvl2Note:''}`});
  if (item.GerAt)       history.push({when:item.GerAt,       what:`${item.Status===S.REJGER?'No aprobada por Gerencia':'Aprobada por Gerencia'} (${item.GerBy})${item.GerNote?' — '+item.GerNote:''}`});
  if (item.FinAt)       history.push({when:item.FinAt,       what:`${item.Status===S.REJFIN?'Observada':'OK Financiero otorgado'} por Finanzas — ${item.FinBy}${item.FinNote?' — '+item.FinNote:''}`});
  if (item.OCNumber)    history.push({when:item.OCDate,       what:`OC asignada: ${item.OCNumber} — Comprador: ${item.Buyer}`});
  history.sort((a,b)=>a.when>b.when?1:-1);
  const historyHtml = history.map(h=>`
    <div class="history-item">
      <div class="history-when">${fmtDT(h.when)}</div>
      <div class="history-what">${escH(h.what)}</div>
    </div>`).join('');

  // Action buttons
  let actionBtns = `<button class="btn btn-secondary btn-sm" id="btn-print-req" title="Imprimir / Guardar PDF">🖨 PDF</button>`;
  actionBtns += `<button class="btn btn-secondary btn-sm" id="btn-dup-req" title="Duplicar como nuevo borrador">⧉ Duplicar</button>`;
  if (canEdit) actionBtns += `<button class="btn btn-secondary" id="btn-edit-req">✏ Editar</button>`;
  if (canApproveN1) actionBtns += `<button class="btn btn-success" id="btn-appn1">✔ Dar visto bueno</button><button class="btn btn-danger" id="btn-rejn1">↩ Devolver al solicitante</button>`;
  if (canApproveN2) actionBtns += `<button class="btn btn-success" id="btn-appn2">✔ Autorizar compra</button><button class="btn btn-danger" id="btn-rejn2">✖ No autorizar</button>`;
  if (canAssignOC)  actionBtns += `<button class="btn btn-info" id="btn-assign-oc">📄 Asignar OC</button>`;
  if (canApproveGer)actionBtns += `<button class="btn btn-success" id="btn-appger">✔ Aprobar</button><button class="btn btn-danger" id="btn-rejger">✖ No aprobar</button>`;
  if (canApproveFin)actionBtns += `<button class="btn btn-success" id="btn-appfin">✔ Dar OK Financiero</button><button class="btn btn-danger" id="btn-rejfin">✖ Observar</button>`;
  if (canReopen)    actionBtns += `<button class="btn btn-secondary" id="btn-reopen">↩ Reabrir como borrador</button>`;
  if (canCorrect)   actionBtns += `<button class="btn btn-primary" id="btn-correct">✏ Corregir y reenviar</button>`;

  // OC section
  const ocHtml = item.OCNumber ? `
    <div class="req-detail-section">
      <h4>Orden de Compra</h4>
      <div class="oc-box">
        <div class="detail-row"><span class="detail-label">N° OC:</span><span class="detail-value num">${escH(item.OCNumber)}</span></div>
        <div class="detail-row"><span class="detail-label">Fecha OC:</span><span class="detail-value">${fmt(item.OCDate)}</span></div>
        <div class="detail-row"><span class="detail-label">Comprador:</span><span class="detail-value">${escH(item.Buyer)}</span></div>
      </div>
    </div>` : '';

  container.innerHTML = `
    <div class="section-header">
      <div>
        <div class="section-title"><span class="num">${escH(item.Title)}</span> &nbsp;<span class="badge ${bc}">${escH(_normalizeStatus(item.Status))}</span></div>
        <div class="section-sub">Departamento: ${escH(item.Dept)} &nbsp;·&nbsp; Urgencia: <span class="badge ${ub}">${escH(item.Urgency)}</span>${item.RequiereGerencia?` &nbsp;·&nbsp; <span class="badge badge-app1">🏢 Requiere Gerencia</span>`:''}</div>
      </div>
      <div class="ml-auto d-flex">
        <button class="btn btn-secondary" id="btn-back-detail">← Volver</button>
        ${actionBtns}
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <!-- LEFT -->
      <div>
        <div class="form-section">
          <div class="req-detail-section">
            <h4>Solicitante</h4>
            <div class="detail-row"><span class="detail-label">Nombre:</span><span class="detail-value">${escH(item.RequesterName)}</span></div>
            <div class="detail-row"><span class="detail-label">Mail:</span><span class="detail-value">${escH(item.RequesterMail)}</span></div>
            <div class="detail-row"><span class="detail-label">Cuenta GL:</span><span class="detail-value">${escH(item.GLAccount)||'—'}${item.GLCorregido?` <span style="font-size:11px;color:var(--yellow);background:rgba(212,160,23,.15);padding:1px 6px;border-radius:10px">corregido por Gerencia</span>`:''}</span></div>

async function doAction(item, fields) {
  await updateItem(item._id, { ...fields, UpdatedAt: isoNow() });
}

// ================================================================
// MODAL HELPER
// ================================================================
function showModal(bodyHtml, title, buttons=[]) {
  const existing = document.getElementById('_modal');
  if (existing) existing.remove();
  const overlay = document.createElement('div');
  overlay.id = '_modal';
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal modal-sm">
      <div class="modal-header">
        <span class="modal-title">${escH(title)}</span>
        <button class="modal-close" id="modal-x">✕</button>
      </div>
      <div class="modal-body">${bodyHtml}</div>
      <div class="modal-footer">
        ${buttons.map((b,i)=>`<button class="btn ${b.cls}" data-bi="${i}">${escH(b.label)}</button>`).join('')}
      </div>
    </div>`;
  document.body.appendChild(overlay);
  overlay.querySelector('#modal-x').addEventListener('click',()=>overlay.remove());
  buttons.forEach((b,i)=>{
    overlay.querySelector(`[data-bi="${i}"]`).addEventListener('click',()=>{
      if (b.cb) b.cb();
      overlay.remove();
    });
  });
}

  let filtroHasta = null;

  async function load() {
    document.getElementById('fin-loading').classList.remove('hidden');
    document.getElementById('fin-content').classList.add('hidden');
    try {
      allData = (await readDB()).map(mapItem);
      aplicarFiltro();
    } catch(e) { toast('Error: '+e.message,'error'); }
    finally { document.getElementById('fin-loading').classList.add('hidden'); }
  }

  function aplicarFiltro(desde, hasta) {
    filtroDesde = desde || null;
    filtroHasta = hasta || null;
    renderContent(allData, filtroDesde, filtroHasta);
  }

  // Calcula totales por moneda de los ítems de una lista de requisiciones
  function calcTotales(items) {
    const t = {ARS:0, USD:0, EUR:0};
    items.forEach(item=>{
      parseLines(item.LinesJSON).forEach(l=>{
        const c = l.currency||'ARS';
        if (t[c]!==undefined) t[c] += (l.qty||0)*(l.price||0);
      });
    });
    return t;
  }

  // Calcula equivalente ARS usando TC cargado
  function toARS(totales) {
    const usdV = parseFloat(tcManual.usd_venta)||0;
    const eurV = parseFloat(tcManual.eur_venta)||0;
    return totales.ARS + totales.USD*usdV + totales.EUR*eurV;
  }

  function fmt2(n) { return n.toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2}); }

  function monedaCeldas(totales) {
    return `
      <td class="money" style="font-size:12px">${totales.ARS>0?'$'+fmt2(totales.ARS):'—'}</td>
      <td class="money" style="font-size:12px;color:${totales.USD>0?'#4caf8a':'var(--text2)'}">${totales.USD>0?'U$S '+fmt2(totales.USD):'—'}</td>
      <td class="money" style="font-size:12px;color:${totales.EUR>0?'#5b8dee':'var(--text2)'}">${totales.EUR>0?'€ '+fmt2(totales.EUR):'—'}</td>
      <td class="money" style="font-size:12px;color:var(--accent);font-weight:600">${(tcManual.usd_venta||tcManual.eur_venta)?'$'+fmt2(toARS(totales)):'—'}</td>`;
  }

  function renderContent(all, desde, hasta) {
    // Filtrar por fecha de creación
    let filtrados = all.filter(i=>[S.APPGER,S.APPFIN,S.REJFIN,S.OC].includes(i.Status));
    if (desde) filtrados = filtrados.filter(i=>(i.CreatedAt||i.SubmittedAt||'').slice(0,10)>=desde);
    if (hasta) filtrados = filtrados.filter(i=>(i.CreatedAt||i.SubmittedAt||'').slice(0,10)<=hasta);

    const pending  = filtrados.filter(i=>i.Status===S.APPGER);
    const approved = filtrados.filter(i=>[S.APPFIN,S.OC].includes(i.Status));
    const rejected = filtrados.filter(i=>i.Status===S.REJFIN);

    const totPend = calcTotales(pending);
    const totAppr = calcTotales(approved);

    // Por cuenta contable
    const byGL = {};
    approved.forEach(item=>{
      const gl = item.GLAccount||'Sin cuenta GL';
      if (!byGL[gl]) byGL[gl] = {items:[]};
      byGL[gl].items.push(item);
    });

    const glRows = Object.entries(byGL)
      .sort((a,b)=>toARS(calcTotales(b[1].items))-toARS(calcTotales(a[1].items)))
      .map(([gl,data])=>{
        const t = calcTotales(data.items);
        const depts = [...new Set(data.items.map(i=>i.Dept))].join(', ');
        return `<tr>
          <td style="font-family:var(--mono);font-weight:600;color:var(--accent);font-size:13px">${escH(gl)}</td>
          <td style="text-align:center;font-size:13px">${data.items.length}</td>
          ${monedaCeldas(t)}
          <td style="font-size:11px;color:var(--text2)">${escH(depts)}</td>
        </tr>`;
      }).join('');

    // Tabla de requisiciones con columnas por moneda
    function reqTable(items, showApproval=false) {
      if (!items.length) return `<div class="empty-state" style="padding:20px"><div class="empty-state-icon">📭</div>Sin requisiciones en este período</div>`;
      return `<div style="overflow-x:auto"><table>
        <thead><tr>
          <th>N° Req.</th><th>Dpto</th><th>Solicitante</th><th>Cuenta GL</th><th>Urg.</th>
          <th style="text-align:right">ARS</th>
          <th style="text-align:right">USD</th>
          <th style="text-align:right">EUR</th>
          <th style="text-align:right;color:var(--accent)">Equiv. ARS</th>
          ${showApproval?'<th>Aprobó Finanzas</th>':'<th>Nota Gerencia</th>'}
          <th></th>
        </tr></thead>
        <tbody>${items.map(i=>{
          const t = calcTotales([i]);
          const arsEquiv = toARS(t);
          return `<tr data-fin-id="${i._id}" style="cursor:pointer">
            <td><span class="num" style="font-size:12px">${escH(i.Title)}</span>
              ${i.GLCorregido?`<br/><span style="font-size:10px;background:rgba(212,160,23,.2);color:var(--yellow);padding:1px 5px;border-radius:8px">GL corregido</span>`:''}
              ${i.RequiereGerencia?`<br/><span style="font-size:10px;background:rgba(46,168,107,.2);color:var(--green);padding:1px 5px;border-radius:8px">🏢 Ger.</span>`:''}
            </td>
            <td style="font-size:12px">${escH(i.Dept)}</td>
            <td style="font-size:12px">${escH(i.RequesterName)}</td>
            <td style="font-family:var(--mono);font-size:12px;color:var(--accent)">${escH(i.GLAccount||'—')}</td>
            <td><span class="badge ${getUrgencyBadge(i.Urgency)}" style="font-size:10px">${escH(i.Urgency)}</span></td>
            <td class="money" style="font-size:12px">${t.ARS>0?'$'+fmt2(t.ARS):'—'}</td>
            <td class="money" style="font-size:12px;color:${t.USD>0?'#4caf8a':'var(--text2)'}">${t.USD>0?'U$S '+fmt2(t.USD):'—'}</td>
            <td class="money" style="font-size:12px;color:${t.EUR>0?'#5b8dee':'var(--text2)'}">${t.EUR>0?'€ '+fmt2(t.EUR):'—'}</td>
            <td class="money" style="font-size:12px;font-weight:600;color:var(--accent)">${(tcManual.usd_venta||tcManual.eur_venta)?'$'+fmt2(arsEquiv):'—'}</td>
            <td style="font-size:11px;color:var(--text2)">
              ${showApproval
                ? (i.FinBy?i.FinBy.split('@')[0]+'<br/>'+fmtDT(i.FinAt):'—')
                : escH((i.GerNote||'—').substring(0,60))}
            </td>
            <td><button class="btn btn-info btn-xs fin-detail-btn" data-id="${i._id}">Ver →</button></td>
          </tr>`;
        }).join('')}
        <!-- Fila de totales -->
        <tr style="background:var(--bg3);font-weight:700;border-top:2px solid var(--border)">
          <td colspan="5" style="font-size:12px;color:var(--text2)">TOTAL (${items.length} requisiciones)</td>
          <td class="money" style="font-size:13px">${calcTotales(items).ARS>0?'$'+fmt2(calcTotales(items).ARS):'—'}</td>
          <td class="money" style="font-size:13px;color:#4caf8a">${calcTotales(items).USD>0?'U$S '+fmt2(calcTotales(items).USD):'—'}</td>
          <td class="money" style="font-size:13px;color:#5b8dee">${calcTotales(items).EUR>0?'€ '+fmt2(calcTotales(items).EUR):'—'}</td>
          <td class="money" style="font-size:13px;color:var(--accent)">${(tcManual.usd_venta||tcManual.eur_venta)?'$'+fmt2(toARS(calcTotales(items))):'—'}</td>
          <td colspan="2"></td>
        </tr>
        </tbody>
      </table></div>`;
    }

    const periodoStr = desde||hasta ? `${desde?'desde '+desde:''} ${hasta?'hasta '+hasta:''}` : 'todos los registros';
    const usdV = tcManual.usd_venta; const eurV = tcManual.eur_venta;

    const dc = document.getElementById('fin-content');
    dc.innerHTML = `
      <div style="font-size:12px;color:var(--text2);margin-bottom:12px">
        Mostrando: <strong>${filtrados.length}</strong> requisiciones — ${periodoStr}
        ${usdV||eurV ? ` &nbsp;·&nbsp; TC: ${usdV?'USD $'+fmt2(Number(usdV)):''}${eurV?' | EUR $'+fmt2(Number(eurV)):''}` : ' &nbsp;·&nbsp; <span style="color:var(--yellow)">⚠ Sin TC cargado — clic en "✎ TC" para ingresar</span>'}
      </div>

      <!-- KPIs -->
      <div class="kpi-grid" style="margin-bottom:20px">
        <div class="kpi"><div class="kpi-label">Pendientes Finanzas</div><div class="kpi-value text-yellow">${pending.length}</div></div>
        <div class="kpi"><div class="kpi-label">Total ARS (pendientes)</div>
          <div style="margin-top:4px">
            ${totPend.ARS>0?`<div style="font-size:13px;font-family:var(--mono)">ARS $${fmt2(totPend.ARS)}</div>`:''}
            ${totPend.USD>0?`<div style="font-size:13px;font-family:var(--mono);color:#4caf8a">USD ${fmt2(totPend.USD)}</div>`:''}
            ${totPend.EUR>0?`<div style="font-size:13px;font-family:var(--mono);color:#5b8dee">EUR ${fmt2(totPend.EUR)}</div>`:''}
            ${!totPend.ARS&&!totPend.USD&&!totPend.EUR?`<div class="kpi-value">—</div>`:''}
          </div>
        </div>
        <div class="kpi"><div class="kpi-label">Aprobadas (período)</div><div class="kpi-value text-green">${approved.length}</div></div>
        <div class="kpi"><div class="kpi-label">Comprometido aprobado</div>
          <div style="margin-top:4px">
            ${totAppr.ARS>0?`<div style="font-size:13px;font-family:var(--mono)">ARS $${fmt2(totAppr.ARS)}</div>`:''}
            ${totAppr.USD>0?`<div style="font-size:13px;font-family:var(--mono);color:#4caf8a">USD ${fmt2(totAppr.USD)}</div>`:''}
            ${totAppr.EUR>0?`<div style="font-size:13px;font-family:var(--mono);color:#5b8dee">EUR ${fmt2(totAppr.EUR)}</div>`:''}
            ${usdV||eurV?`<div style="font-size:12px;color:var(--accent);font-weight:600;margin-top:4px">≈ ARS $${fmt2(toARS(totAppr))}</div>`:''}
            ${!totAppr.ARS&&!totAppr.USD&&!totAppr.EUR?`<div class="kpi-value">—</div>`:''}
          </div>
        </div>
      </div>

      ${pending.length?`<div style="background:rgba(212,160,23,.08);border:1px solid rgba(212,160,23,.3);border-radius:4px;padding:10px 16px;margin-bottom:16px;font-size:13px;color:var(--yellow)">
        ⏳ <strong>${pending.length}</strong> requisición(es) esperando aprobación de Finanzas
      </div>`:''}

      <!-- Pendientes -->
      <div class="card mb-4">
        <div class="section-title" style="font-size:14px;margin-bottom:14px">🔔 Pendientes de Aprobación Finanzas</div>
        ${reqTable(pending, false)}
      </div>

      <!-- Por Cuenta Contable (aprobadas) -->
      ${approved.length?`
      <div class="card mb-4">
        <div class="section-title" style="font-size:14px;margin-bottom:14px">📊 Comprometido por Cuenta Contable — aprobadas</div>
        <div style="overflow-x:auto"><table>
          <thead><tr>
            <th>Cuenta GL</th>
            <th style="text-align:center">Req.</th>
            <th style="text-align:right">ARS</th>
            <th style="text-align:right">USD</th>
            <th style="text-align:right">EUR</th>
            <th style="text-align:right;color:var(--accent)">Equiv. ARS</th>
            <th>Departamentos</th>
          </tr></thead>
          <tbody>${glRows}
          <!-- Total GL -->
          <tr style="background:var(--bg3);font-weight:700;border-top:2px solid var(--border)">
            <td style="font-size:12px;color:var(--text2)">TOTAL</td>
            <td style="text-align:center">${approved.length}</td>
            ${monedaCeldas(totAppr)}
            <td></td>
          </tr>
          </tbody>
        </table></div>
      </div>`:''}

      <!-- Aprobadas -->
      <div class="card mb-4">
        <div class="section-title" style="font-size:14px;margin-bottom:14px">✅ Aprobadas por Finanzas (${approved.length})</div>
        ${reqTable(approved, true)}
      </div>

      ${rejected.length?`
      <div class="card mb-4">
        <div class="section-title" style="font-size:14px;margin-bottom:14px">✖ Rechazadas por Finanzas (${rejected.length})</div>
        ${reqTable(rejected, false)}
      </div>`:''}
    `;
    dc.classList.remove('hidden');

    dc.querySelectorAll('.fin-detail-btn').forEach(btn=>{
      btn.addEventListener('click',()=>{
        const found = allData.find(i=>i._id===btn.dataset.id);
        if (found) { renderDetail(found); showView('detail'); }
      });
    });
    dc.querySelectorAll('tr[data-fin-id]').forEach(row=>{
      row.addEventListener('dblclick',()=>{
        const found=allData.find(i=>i._id===row.dataset.finId);
        if(found){renderDetail(found);showView('detail');}
      });
    });
    dc.querySelectorAll('tr[data-fin-id]').forEach(row=>{
      row.addEventListener('dblclick',()=>{
        const found = allData.find(i=>i._id===row.dataset.finId);
        if(found){renderDetail(found);showView('detail');}
      });
    });
  }

  // Export CSV fecha a fecha
  function doExport(desde, hasta) {
    const usdV = parseFloat(tcManual.usd_venta)||0;
    const eurV = parseFloat(tcManual.eur_venta)||0;
    let items = allData.filter(i=>[S.APPGER,S.APPFIN,S.REJFIN,S.OC].includes(i.Status));
    if (desde) items = items.filter(i=>(i.CreatedAt||i.SubmittedAt||'').slice(0,10)>=desde);
    if (hasta) items = items.filter(i=>(i.CreatedAt||i.SubmittedAt||'').slice(0,10)<=hasta);

    const rows = [];
    // Encabezado con metadatos del reporte
    rows.push({
      Numero:'REPORTE FINANZAS', Departamento:`Período: ${desde||'inicio'} al ${hasta||'hoy'}`,
      Solicitante:'', Estado:'', CuentaGL:'',CentroCosto:'',
      TotalARS:'',TotalUSD:'',TotalEUR:'',
      TC_USD_Venta:usdV||'', TC_EUR_Venta:eurV||'',
      EquivARS:'',Descripcion:'',Cantidad:'',Unidad:'',Moneda:'',PrecioUnit:'',TotalLinea:'',
      GLCorregido:'',NotaGerencia:'',AprobadoGer:'',FechaGer:'',AprobadoFin:'',FechaFin:'',OC:'',Comprador:''
    });

    items.forEach(item=>{
      const t = calcTotales([item]);
      const arsEquiv = t.ARS + t.USD*usdV + t.EUR*eurV;
      const lines = parseLines(item.LinesJSON);
      lines.forEach((l,idx)=>{
        rows.push({
          Numero:        idx===0?item.Title:'',
          Departamento:  idx===0?item.Dept:'',
          Solicitante:   idx===0?item.RequesterName:'',
          Estado:        idx===0?item.Status:'',
          CuentaGL:      idx===0?item.GLAccount||'':'',
          CentroCosto:   idx===0?item.CostCenter||'':'',
          TotalARS:      idx===0&&t.ARS>0?t.ARS:'',
          TotalUSD:      idx===0&&t.USD>0?t.USD:'',
          TotalEUR:      idx===0&&t.EUR>0?t.EUR:'',
          TC_USD_Venta:  idx===0&&usdV?usdV:'',
          TC_EUR_Venta:  idx===0&&eurV?eurV:'',
          EquivARS:      idx===0&&(usdV||eurV)?arsEquiv:'',
          Descripcion:   l.desc,
          Cantidad:      l.qty,
          Unidad:        l.unit,
          Moneda:        l.currency||'ARS',
          PrecioUnit:    l.price,
          TotalLinea:    (l.qty||0)*(l.price||0),
          GLCorregido:   idx===0&&item.GLCorregido?'SÍ':'',
          NotaGerencia:  idx===0?item.GerNote||'':'',
          AprobadoGer:   idx===0?item.GerBy||'':'',
          FechaGer:      idx===0?fmtDT(item.GerAt):'',
          AprobadoFin:   idx===0?item.FinBy||'':'',
          FechaFin:      idx===0?fmtDT(item.FinAt||''):'',
          OC:            idx===0?item.OCNumber||'':'',
          Comprador:     idx===0?item.Buyer||'':''
        });
      });
    });

    const fname = `Finanzas_${desde||'inicio'}_al_${hasta||hoy}.csv`;
    exportCSV(rows, fname);
    toast(`CSV exportado — ${items.length} requisiciones`, 'success');
  }

  // Eventos
  document.getElementById('fin-refresh').addEventListener('click', load);
  document.getElementById('fin-tc-edit').addEventListener('click', showTCEditor);
  document.getElementById('fin-aplicar').addEventListener('click',()=>{
    const desde = document.getElementById('fin-desde').value;
    const hasta = document.getElementById('fin-hasta').value;
    aplicarFiltro(desde||null, hasta||null);
  });
  document.getElementById('fin-todo').addEventListener('click',()=>{
    document.getElementById('fin-desde').value='';
    document.getElementById('fin-hasta').value='';
    aplicarFiltro(null,null);
  });
  document.getElementById('fin-export').addEventListener('click',()=>{
    const desde = document.getElementById('fin-desde').value||null;
    const hasta = document.getElementById('fin-hasta').value||null;
    doExport(desde, hasta);
  });

  load();
}

function renderGerenteView() {
  showView('gerente');
  const container = document.getElementById('view-gerente');
  container.innerHTML = `
    <div class="section-header">
      <div>
        <div class="section-title">Reporte Ejecutivo — Gerencia General</div>
        <div class="section-sub">Requisiciones que requieren aprobación de Gerencia y resumen ejecutivo</div>
      </div>
      <div class="ml-auto d-flex">
        <button class="btn btn-secondary btn-sm" id="ger-refresh">↻ Actualizar</button>
        <button class="btn btn-secondary btn-sm" id="ger-export">⬇ CSV</button>
      </div>
    </div>
    <div id="ger-loading" class="loading-overlay"><div class="loader"></div> Cargando…</div>
    <div id="ger-content" class="hidden"></div>
  `;

  async function load() {
    document.getElementById('ger-loading').classList.remove('hidden');
    document.getElementById('ger-content').classList.add('hidden');
    try {
      const all = await readDB();
      const mapped = all.map(mapItem);
      renderGerContent(mapped);
    } catch(e) { toast('Error cargando datos: '+e.message,'error'); }
    finally { document.getElementById('ger-loading').classList.add('hidden'); }
  }

  function renderGerContent(all) {
    const pendGer  = all.filter(i=>i.Status===S.APP2);
    const appGer   = all.filter(i=>i.Status===S.APPGER||i.Status===S.OC);
    const rejGer   = all.filter(i=>i.Status===S.REJGER);
    const criticas = all.filter(i=>i.Urgency==='Crítica'&&i.Status===S.APP2);

    function miniTable(items, emptyMsg) {
      if (!items.length) return `<div class="empty-state" style="padding:24px"><div class="empty-state-icon">📭</div>${emptyMsg}</div>`;
      return `<div style="overflow-x:auto"><table>
        <thead><tr><th>N° Req.</th><th>Departamento</th><th>Solicitante</th><th>Urgencia</th><th>Ítems</th><th>Total estimado</th><th>Fecha necesaria</th><th>Justificación</th><th></th></tr></thead>
        <tbody>${items.map(i=>{
          const lines = parseLines(i.LinesJSON);
          const totals = {};
          lines.forEach(l=>{ totals[l.currency||'ARS']=(totals[l.currency||'ARS']||0)+(l.qty||0)*(l.price||0); });
          const totalStr = Object.entries(totals).filter(([,v])=>v>0).map(([c,v])=>`${c} ${v.toLocaleString('es-AR',{minimumFractionDigits:2})}`).join(' + ')||'—';
          const ub = getUrgencyBadge(i.Urgency);
          const bc = getBadgeClass(i.Status);
          return `<tr style="cursor:pointer" class="ger-row" data-id="${i._id}">
            <td><span class="num">${escH(i.Title)}</span></td>
            <td>${escH(i.Dept)}</td>
            <td>${escH(i.RequesterName)}</td>
            <td><span class="badge ${ub}">${escH(i.Urgency)}</span></td>
            <td>${lines.length}</td>
            <td class="money" style="font-size:12px">${totalStr}</td>
            <td>${fmt(i.NeedBy)}</td>
            <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text2);font-size:12px">${escH(i.Justification).substring(0,80)}</td>
            <td><button class="btn btn-info btn-xs ger-detail-btn" data-id="${i._id}">Ver detalle</button></td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>`;
    }

    const dc = document.getElementById('ger-content');
    dc.innerHTML = `
      <!-- KPIs Gerencia -->
      <div class="kpi-grid" style="margin-bottom:24px">
        <div class="kpi"><div class="kpi-label">Pendientes mi aprobación</div><div class="kpi-value text-yellow">${pendGer.length}</div></div>
        <div class="kpi"><div class="kpi-label">Críticas pendientes</div><div class="kpi-value text-red">${criticas.length}</div></div>
        <div class="kpi"><div class="kpi-label">Aprobadas por Gerencia</div><div class="kpi-value text-green">${appGer.length}</div></div>
        <div class="kpi"><div class="kpi-label">Rechazadas por Gerencia</div><div class="kpi-value">${rejGer.length}</div></div>
      </div>

      <!-- Pendientes -->
      ${pendGer.length?`<div style="background:rgba(212,160,23,.08);border:1px solid rgba(212,160,23,.3);border-radius:4px;padding:10px 16px;margin-bottom:16px;font-size:13px;color:var(--yellow)">
        ⏳ Hay <strong>${pendGer.length}</strong> requisición(es) esperando su aprobación
        ${criticas.length?` — <strong>${criticas.length} CRÍTICA(S)</strong>`:''}</div>`:''}

      <div class="card mb-4">
        <div class="section-title" style="font-size:14px;margin-bottom:14px">🔔 Pendientes de Aprobación Gerencia</div>
        ${miniTable(pendGer,'No hay requisiciones pendientes de su aprobación')}
      </div>

      <div class="card mb-4">
        <div class="section-title" style="font-size:14px;margin-bottom:14px">✅ Aprobadas por Gerencia (con o sin OC)</div>
        ${miniTable(appGer,'Sin requisiciones aprobadas aún')}
      </div>

      ${rejGer.length?`<div class="card mb-4">
        <div class="section-title" style="font-size:14px;margin-bottom:14px">✖ Rechazadas por Gerencia</div>
        ${miniTable(rejGer,'')}
      </div>`:''}
    `;
    dc.classList.remove('hidden');

    // Row clicks → detail
    dc.querySelectorAll('.ger-row,.ger-detail-btn').forEach(el=>{
      ['click','dblclick'].forEach(evt=>el.addEventListener(evt,()=>{
        const id = el.dataset.id;
        const found = all.find(i=>i._id===id);
        if(found){renderDetail(found);showView('detail');}
      }));

function generateActivationUrl(cfg) {
  const payload = JSON.stringify({ ghToken: cfg.ghToken, ghRepo: cfg.ghRepo });

  return window.location.href.split('?')[0].split('#')[0] + '?activar=' + encoded;
}
