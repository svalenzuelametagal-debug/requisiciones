let _lastNotifCheck = Date.now();
let _notifKnownIds = new Set();
let _notifInterval = null;

async function requestNotifPermission() {
  if (!('Notification' in window)) return false;
  if (Notification.permission === 'granted') return true;
  if (Notification.permission === 'denied') return false;
  const perm = await Notification.requestPermission();
  return perm === 'granted';
}

function sendNotif(title, body, tag) {
  if (Notification.permission !== 'granted') return;
  const n = new Notification(title, {
    body, tag: tag||'metagal-req',
    icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" rx="6" fill="%23f0b030"/><text x="16" y="22" font-size="18" text-anchor="middle" fill="%23000">📋</text></svg>'
  });
  n.onclick = () => { window.focus(); n.close(); };
}

async function checkForUpdates() {
  if (!currentUser) return;
  try {
    const all = await readDB();
    const email = currentUser.username.toLowerCase();
    const role = userRole;
    let newCount = 0;

    all.forEach(item => {
      if (_notifKnownIds.has(item.id||item._id)) return;
      _notifKnownIds.add(item.id||item._id);
      if (_lastNotifCheck === 0) return; // primera carga, no notificar todo
      
      const isOwn = (item.RequesterMail||'').toLowerCase() === email;
      const isApprover = role==='approver'||role==='admin';
      const isGerente = role==='gerente';
      const isFin = role==='finanzas';

      // Notificar al solicitante cuando cambia el estado de su requisicion
      if (isOwn && item.UpdatedAt && new Date(item.UpdatedAt) > new Date(_lastNotifCheck)) {
        sendNotif('Requisicion ' + item.Title, 'Estado: ' + item.Status, item.id||item._id);
        newCount++;
      }
      // Notificar al aprobador cuando hay nuevas pendientes
      if (isApprover && item.Status===S.SENT) {
        sendNotif('Nueva requisicion pendiente', item.Title + ' — ' + (item.RequesterName||''), 'new-'+item.id);
        newCount++;
      }
      if (isGerente && item.Status===S.APP2) {
        sendNotif('Requisicion pendiente de Gerencia', item.Title, 'ger-'+item.id);
        newCount++;
      }
      if (isFin && (item.Status===S.APPGER||item.Status===S.APP2NOGER)) {
        sendNotif('Requisicion pendiente en Finanzas', item.Title, 'fin-'+item.id);
        newCount++;
      }
    });
    _lastNotifCheck = Date.now();
  } catch(_) {}
}

function startNotifPolling() {
  if (_notifInterval) return;
  // Carga inicial de IDs conocidos sin notificar
  readDB().then(all => {
    all.forEach(i => _notifKnownIds.add(i.id||i._id));
    _lastNotifCheck = Date.now();
  }).catch(()=>{});
  // Revisar cada 2 minutos
  _notifInterval = setInterval(checkForUpdates, 2*60*1000);
}

function stopNotifPolling() {
  if (_notifInterval) { clearInterval(_notifInterval); _notifInterval=null; }
}


async function bootstrap() {
  // Registrar Service Worker para PWA
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(()=>{});
  }
  try {
    document.getElementById('footer-year').textContent = new Date().getFullYear();

    // Procesar link de activación (?activar=BASE64)
    const params = new URLSearchParams(window.location.search);
    if (params.get('activar')) {
      try {
        const raw = decodeURIComponent(params.get('activar'));
        const cfg = JSON.parse(decodeURIComponent(escape(atob(raw))));
        if (cfg.ghToken && cfg.ghRepo) {
          saveCfg({ ghToken: cfg.ghToken, ghRepo: cfg.ghRepo });
          window.history.replaceState({}, '', window.location.pathname);
          showLoginScreen();
          const errEl = document.getElementById('login-err');
          errEl.style.cssText = 'color:#2ea86b;background:rgba(46,168,107,.1);border:1px solid rgba(46,168,107,.3);border-radius:4px;padding:10px 14px;margin-top:12px;display:block';
          errEl.textContent = '✔ Activacion exitosa! Ya podes iniciar sesion.';
          errEl.classList.remove('hidden');
          return;
        }
      } catch(e) { console.warn('Link invalido:', e); }
    }

    if (window.location.protocol === 'file:') {
      showLoginScreen();
      document.getElementById('login-err').textContent =
        '⚠ El archivo está abierto desde tu computadora. Abrilo desde la URL de GitHub Pages (https://...).';
      document.getElementById('login-err').classList.remove('hidden');
      document.getElementById('btn-login').disabled = true;
      document.getElementById('btn-login').textContent = 'Abrí la URL de GitHub Pages';
      return;
    }

    await msalInstance.initialize();
    await msalInstance.handleRedirectPromise().catch(()=>{});

    const accounts = msalInstance.getAllAccounts();
    if (accounts.length) {
      // Intentar renovar token silenciosamente
      try {
        await msalInstance.acquireTokenSilent({scopes:GRAPH_SCOPES, account:accounts[0]});
      } catch(_) {}
      await initApp(accounts[0]);
    } else {
      showLoginScreen();
    }
  } catch(e) {
    console.error('Bootstrap error:', e);
    showLoginScreen();
    const errEl = document.getElementById('login-err');
    if (errEl) {
      errEl.textContent = 'Error al iniciar: ' + (e.message||'desconocido') + '. Recargá la página.';
      errEl.classList.remove('hidden');
    }
  }
}

function showLoginScreen() {
  document.getElementById('login-screen').classList.remove('hidden');
  document.getElementById('app').classList.add('hidden');
  const btn = document.getElementById('btn-login');
  // Evitar duplicar el listener
  const newBtn = btn.cloneNode(true);
  btn.parentNode.replaceChild(newBtn, btn);
  newBtn.addEventListener('click', async()=>{
    newBtn.disabled=true; newBtn.textContent='Conectando…';
    const errEl = document.getElementById('login-err');
    errEl.classList.add('hidden');

    async function tryLogin(attempt) {
      try {
        if (attempt > 1) {
          localStorage.removeItem('msal.interaction.status');
          await new Promise(r=>setTimeout(r,600));
        }
        const res = await msalInstance.loginPopup({scopes:GRAPH_SCOPES});
        await initApp(res.account);
      } catch(e) {
        const msg = (e.message||'').toLowerCase();
        const code = (e.errorCode||'').toLowerCase();
        if (code==='user_cancelled' || msg.includes('user_cancel') || msg.includes('closed')) {
          newBtn.disabled=false;
          newBtn.textContent='🔑 Iniciar sesion con Microsoft 365';
          return;
        }
        if ((msg.includes('interaction_in_progress')||msg.includes('popup_window_error')) && attempt < 3) {
          newBtn.textContent='Reintentando…';
          await new Promise(r=>setTimeout(r,800));
          return tryLogin(attempt+1);
        }
        errEl.textContent = 'Error: ' + (e.message||e.errorCode||'No se pudo iniciar sesion');
        errEl.classList.remove('hidden');
        newBtn.disabled=false;
        newBtn.textContent='🔑 Iniciar sesion con Microsoft 365';
      }
    }
    await tryLogin(1);
  });
}

async function initApp(account) {
  currentUser = account;
  const email = (account.username||'').toLowerCase();
  if (ROLES_ADMIN.map(r=>r.toLowerCase()).includes(email))       userRole='admin';
  else if (ROLES_APPROVER.map(r=>r.toLowerCase()).includes(email))   userRole='approver';
  else if (ROLES_GERENTE.map(r=>r.toLowerCase()).includes(email))    userRole='gerente';
  else if (ROLES_FINANZAS.map(r=>r.toLowerCase()).includes(email))   userRole='finanzas';
  else userRole='user';
  const canCreate = !ROLES_NO_CREATE.map(r=>r.toLowerCase()).includes(email);

  document.getElementById('user-name').textContent = String(account.name||account.username||'').normalize('NFC');
  // Iniciar notificaciones
  requestNotifPermission().then(ok => { if(ok) startNotifPolling(); });
  document.getElementById('user-role').textContent = {
    admin:'Administrador', approver:'Aprobador N1',
    gerente:'Gerente General', finanzas:'Finanzas',
    user:'Usuario'
  }[userRole];
  document.getElementById('login-screen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');

  document.getElementById('btn-logout').addEventListener('click',()=>{
    msalInstance.logoutPopup({account:currentUser}).then(()=>{
      currentUser=null; allItems=[];
      showLoginScreen();
    });
  });

  document.getElementById('tc-badge').addEventListener('click', showTCEditor);

  buildNav();
  fetchTC();
  // Token embebido en CFG — no se necesita activación por browser
  if (userRole==='gerente') {
    renderGerenteView(); showView('gerente');
  } else if (userRole==='finanzas') {
    renderFinanzasView(); showView('finanzas');
  } else {
    renderList(false);
  }
}

bootstrap().catch(e=>console.error('Bootstrap error:',e.message));
</script>
